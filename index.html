<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SolarCycle Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        html, body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; height: 100dvh; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100%; padding: 0.5rem; padding-top: calc(0.5rem + var(--safe-top)); box-sizing: border-box; max-width: 480px; margin: 0 auto; }
        .settings-panel { background: white; border-radius: 1.25rem; padding: 0.75rem; border: 1px solid #f1f5f9; margin-bottom: 0.5rem; flex-shrink: 0; }
        .visualizer-area { flex: 2; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0; width: 100%; }
        canvas { height: 100%; width: 100%; object-fit: contain; background: white; border-radius: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: background-color 0.5s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .info-hub { background: white; padding: 1.25rem; border-radius: 2rem; box-shadow: 0 -5px 30px rgba(0,0,0,0.06); border: 1px solid #f1f5f9; flex-shrink: 0; margin-bottom: var(--safe-bottom); position: relative; }
        .offset-btn { width: 32px; height: 32px; background: #f1f5f9; border-radius: 8px; font-weight: 900; font-size: 14px; color: #475569; display: flex; align-items: center; justify-content: center; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 8px; background: #e2e8f0; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%; background: #4f46e5; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #popover { pointer-events: none; opacity: 0; transition: opacity 0.3s; transform: translateY(10px); }
        #popover.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="flex justify-between items-center px-4 mb-2 flex-shrink-0">
            <h1 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">SolarCycle Pro</h1>
            <div id="statusTag" class="text-[9px] font-black text-indigo-500 bg-indigo-50 px-2 py-1 rounded-md uppercase">Live Sync</div>
        </header>

        <section class="settings-panel">
            <div class="flex gap-2 items-end mb-3">
                <div class="flex-1">
                    <label class="text-[8px] font-black text-slate-400 block mb-1 uppercase px-1">Latitude</label>
                    <input type="number" id="latIn" value="45.27" step="0.0001" class="w-full p-2.5 bg-slate-50 rounded-xl text-sm font-bold border border-slate-100 text-center focus:ring-2 ring-indigo-100 outline-none">
                </div>
                <div class="flex-1">
                    <label class="text-[8px] font-black text-slate-400 block mb-1 uppercase px-1">Longitude</label>
                    <input type="number" id="lonIn" value="-66.06" step="0.0001" class="w-full p-2.5 bg-slate-50 rounded-xl text-sm font-bold border border-slate-100 text-center focus:ring-2 ring-indigo-100 outline-none">
                </div>
            </div>
            <div class="flex justify-between items-center bg-slate-50 p-2 rounded-xl border border-slate-100">
                <button onclick="resetToGeoOffset()" class="offset-btn text-[10px]">↺</button>
                <div class="flex items-center gap-4">
                    <button onclick="adjTZ(-1)" class="offset-btn active:bg-slate-200">-</button>
                    <span id="tzLabel" class="text-xs font-black text-slate-700 min-w-[60px] text-center">UTC-4</span>
                    <button onclick="adjTZ(1)" class="offset-btn active:bg-slate-200">+</button>
                </div>
            </div>
        </section>

        <main class="visualizer-area">
            <canvas id="cvs" width="800" height="800"></canvas>
        </main>

        <div class="flex gap-2 overflow-x-auto px-2 py-3 mb-1 flex-shrink-0 no-scrollbar items-center">
            <button onclick="showTip('Day', 'Full sunlight. Best for high-shutter speed or architecture shots.', '#fbbf24')" class="flex items-center gap-1.5 bg-white px-3 py-2 rounded-xl shadow-sm border border-slate-100 text-[9px] font-extrabold text-slate-500 uppercase whitespace-nowrap"><span class="w-2.5 h-2.5 rounded-full bg-[#fbbf24]"></span> Day</button>
            <button onclick="showTip('Golden Hour', 'Soft, warm light perfect for portraits and landscapes.', '#f59e0b')" class="flex items-center gap-1.5 bg-white px-3 py-2 rounded-xl shadow-sm border border-slate-100 text-[9px] font-extrabold text-slate-500 uppercase whitespace-nowrap"><span class="w-2.5 h-2.5 rounded-full bg-[#f59e0b]"></span> Golden Hour</button>
            <button onclick="showTip('Twilight', 'The blue hour. Civil, Nautical, and Astronomical phases.', '#4f46e5')" class="flex items-center gap-1.5 bg-white px-3 py-2 rounded-xl shadow-sm border border-slate-100 text-[9px] font-extrabold text-slate-500 uppercase whitespace-nowrap"><span class="w-2.5 h-2.5 rounded-full bg-[#4f46e5]"></span> Twilight</button>
            <button onclick="showTip('Night', 'Total darkness. Ideal for astrophotography.', '#0f172a')" class="flex items-center gap-1.5 bg-white px-3 py-2 rounded-xl shadow-sm border border-slate-100 text-[9px] font-extrabold text-slate-500 uppercase whitespace-nowrap"><span class="w-2.5 h-2.5 rounded-full bg-[#0f172a]"></span> Night</button>
        </div>

        <footer class="info-hub">
            <div id="popover" class="absolute -top-16 left-4 right-4 bg-slate-900 text-white p-3 rounded-2xl shadow-2xl z-50">
                <p id="tipTitle" class="text-[10px] font-black uppercase tracking-widest mb-0.5">TITLE</p>
                <p id="tipDesc" class="text-[11px] font-medium leading-tight text-slate-300">Description.</p>
            </div>

            <div class="flex justify-between items-center mb-5 pb-5 border-b border-slate-50">
                <div class="text-left">
                    <p class="text-[9px] font-black text-amber-500 uppercase mb-1">Sunrise</p>
                    <time id="riseT" class="text-3xl font-black text-slate-900 tracking-tighter">--:--</time>
                    <p id="dayL" class="text-[8px] font-bold text-slate-400 mt-1 uppercase">--H --M DAY</p>
                </div>
                <div class="text-center">
                    <div class="bg-indigo-600 px-3 py-1 rounded-full shadow-lg shadow-indigo-100">
                        <span id="dateD" class="text-[10px] font-black text-white block">--</span>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[9px] font-black text-indigo-500 uppercase mb-1">Sunset</p>
                    <time id="setT" class="text-3xl font-black text-slate-900 tracking-tighter">--:--</time>
                    <p id="nightL" class="text-[8px] font-bold text-slate-400 mt-1 uppercase">--H --M NIGHT</p>
                </div>
            </div>
            
            <div class="flex justify-between items-center px-2 mb-5">
                <div class="text-center bg-slate-50 px-4 py-2 rounded-xl flex-1 mr-2 border border-slate-100">
                    <p class="text-[8px] font-black text-slate-400 uppercase mb-0.5">Moonrise</p>
                    <p id="mRise" class="text-sm font-black text-slate-800">--:--</p>
                </div>
                <div class="text-center bg-slate-50 px-4 py-2 rounded-xl flex-1 ml-2 border border-slate-100">
                    <p class="text-[8px] font-black text-slate-400 uppercase mb-0.5">Moonset</p>
                    <p id="mSet" class="text-sm font-black text-slate-800">--:--</p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <input type="range" id="sld" min="0" max="365" value="0" class="flex-1">
                <button id="resetBtn" class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Now</button>
            </div>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('cvs'), ctx = canvas.getContext('2d'), W = 800, H = 800, R = 320, R_MOON = 240;
        const latIn = document.getElementById('latIn'), lonIn = document.getElementById('lonIn'), sld = document.getElementById('sld');
        const dateD = document.getElementById('dateD'), riseT = document.getElementById('riseT'), setT = document.getElementById('setT'), tzLabel = document.getElementById('tzLabel');
        const dayL = document.getElementById('dayL'), nightL = document.getElementById('nightL'), mRise = document.getElementById('mRise'), mSet = document.getElementById('mSet');
        const pop = document.getElementById('popover'), tipT = document.getElementById('tipTitle'), tipD = document.getElementById('tipDesc');

        let manualOffset = Math.round(parseFloat(lonIn.value) / 15);
        let tipTimer;

        function showTip(title, desc, color) {
            clearTimeout(tipTimer);
            tipT.innerText = title; tipT.style.color = color; tipD.innerText = desc;
            pop.classList.add('show');
            tipTimer = setTimeout(() => pop.classList.remove('show'), 3500);
        }

        function adjTZ(v) { manualOffset += v; render(); }
        function resetToGeoOffset() { manualOffset = Math.round(parseFloat(lonIn.value) / 15); render(); }

        function getTargetDate(offsetHours) {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * offsetHours));
        }

        function fmt(d) {
            if (!d || isNaN(d.getTime())) return '---';
            let hr = d.getHours(), mn = d.getMinutes();
            return `${hr % 12 || 12}:${String(mn).padStart(2, '0')} ${hr >= 12 ? 'PM' : 'AM'}`;
        }

        function render() {
            ctx.clearRect(0, 0, W, H);
            const lat = parseFloat(latIn.value), lon = parseFloat(lonIn.value);
            tzLabel.textContent = `UTC${manualOffset >= 0 ? '+' : ''}${manualOffset}`;

            const targetNow = getTargetDate(manualOffset);
            const viewDate = new Date(targetNow);
            viewDate.setDate(viewDate.getDate() + parseInt(sld.value));
            
            dateD.textContent = viewDate.toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase();
            
            const times = SunCalc.getTimes(viewDate, lat, lon);
            const mTimes = SunCalc.getMoonTimes(viewDate, lat, lon);
            
            riseT.textContent = fmt(times.sunrise); 
            setT.textContent = fmt(times.sunset);

            // Corrected Moon Rise/Set display logic
            mRise.textContent = mTimes.alwaysUp ? 'UP ALL DAY' : (mTimes.alwaysDown ? 'DOWN' : (mTimes.rise ? fmt(mTimes.rise) : '--:--'));
            mSet.textContent = mTimes.alwaysUp ? 'UP ALL DAY' : (mTimes.alwaysDown ? 'DOWN' : (mTimes.set ? fmt(mTimes.set) : '--:--'));

            if (times.sunrise && times.sunset) {
                const dl = (times.sunset - times.sunrise) / 3600000;
                dayL.textContent = `${Math.floor(dl)}H ${Math.round((dl%1)*60)}M DAY`;
                nightL.textContent = `${Math.floor(24-dl)}H ${Math.round(((24-dl)%1)*60)}M NIGHT`;
            }

            const isNightAtTarget = targetNow < times.sunrise || targetNow > times.sunset;
            canvas.style.backgroundColor = isNightAtTarget ? '#0f172a' : '#ffffff';
            const textColor = isNightAtTarget ? '#f8fafc' : '#1e293b';

            const getPos = (d) => {
                if (!d || isNaN(d.getTime())) return null;
                const h = d.getHours() + d.getMinutes()/60 + d.getSeconds()/3600;
                return (h/24)*2*Math.PI-Math.PI/2;
            };

            const drawArc = (s, e, c, rad, w=50) => {
                if (!s || !e) return;
                ctx.strokeStyle = c; ctx.lineWidth = w; ctx.beginPath();
                ctx.arc(400, 400, rad, getPos(s), getPos(e));
                ctx.stroke();
            };

            // Sun Ring
            drawArc(new Date(2026,0,1,0,0), new Date(2026,0,1,23,59), isNightAtTarget ? '#1e293b' : '#f1f5f9', R); 
            drawArc(times.dawn, times.night, '#4f46e5', R); 
            drawArc(times.sunrise, times.sunset, '#fbbf24', R); 
            drawArc(times.sunrise, times.goldenHourEnd, '#f59e0b', R, 60); 
            drawArc(times.goldenHour, times.sunset, '#f59e0b', R, 60); 

            // Noon Marker
            if (times.solarNoon) {
                const noonAng = getPos(times.solarNoon);
                ctx.strokeStyle = isNightAtTarget ? '#334155' : '#ffffff'; ctx.lineWidth = 5; ctx.beginPath();
                ctx.moveTo(400 + (R-30)*Math.cos(noonAng), 400 + (R-30)*Math.sin(noonAng));
                ctx.lineTo(400 + (R+30)*Math.cos(noonAng), 400 + (R+30)*Math.sin(noonAng));
                ctx.stroke();
            }

            // Moon Ring
            drawArc(new Date(2026,0,1,0,0), new Date(2026,0,1,23,59), isNightAtTarget ? '#1e293b' : '#f1f5f9', R_MOON, 25); 
            const sod = new Date(viewDate); sod.setHours(0,0,0,0);
            const eod = new Date(viewDate); eod.setHours(23,59,59,999);
            
            if (mTimes.alwaysUp) { drawArc(sod, eod, '#cbd5e1', R_MOON, 25); } 
            else if (!mTimes.alwaysDown && mTimes.rise && mTimes.set) {
                if (mTimes.rise < mTimes.set) drawArc(mTimes.rise, mTimes.set, '#cbd5e1', R_MOON, 25);
                else { drawArc(sod, mTimes.set, '#cbd5e1', R_MOON, 25); drawArc(mTimes.rise, eod, '#cbd5e1', R_MOON, 25); }
            }

            // Dial
            ctx.textAlign = 'center'; ctx.fillStyle = textColor; ctx.font = 'bold 16px Inter';
            for (let i = 0; i < 24; i += 3) {
                const a = (i/24)*2*Math.PI-Math.PI/2;
                ctx.fillText(i === 0 ? '24' : i, 400 + 375*Math.cos(a), 400 + 375*Math.sin(a));
            }

            // Current Time Hand
            const handAng = getPos(targetNow);
            ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 14; ctx.lineCap = 'round'; ctx.beginPath();
            ctx.moveTo(400, 400); ctx.lineTo(400 + (R+10)*Math.cos(handAng), 400 + (R+10)*Math.sin(handAng));
            ctx.stroke();

            // Center Digital Time
            ctx.fillStyle = textColor; ctx.font = '900 100px Inter';
            const hh = String(targetNow.getHours()).padStart(2, '0'), mm = String(targetNow.getMinutes()).padStart(2, '0');
            ctx.fillText(`${hh}:${mm}`, 400, 430);
        }

        sld.oninput = render;
        latIn.oninput = resetToGeoOffset;
        lonIn.oninput = resetToGeoOffset;
        document.getElementById('resetBtn').onclick = () => { sld.value = 0; render(); };
        
        window.onload = () => { 
            navigator.geolocation.getCurrentPosition(p => {
                latIn.value = p.coords.latitude.toFixed(4);
                lonIn.value = p.coords.longitude.toFixed(4);
                resetToGeoOffset();
            });
            render(); 
            setInterval(render, 1000); 
        };
    </script>
</body>
</html>
