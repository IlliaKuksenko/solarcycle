<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luminaries Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        html, body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; height: 100dvh; overflow: hidden; }
        
        .app-container { display: flex; flex-direction: column; height: 100%; padding: 0.8rem; padding-top: calc(0.5rem + var(--safe-top)); box-sizing: border-box; max-width: 480px; margin: 0 auto; }
        
        /* Interactive Canvas */
        .canvas-box { flex: 1; background: #0f172a; border-radius: 2rem; position: relative; margin-bottom: 1rem; overflow: hidden; }
        canvas { width: 100%; height: 100%; object-fit: contain; -webkit-tap-highlight-color: transparent; }
        
        /* Popup Overlay */
        #tip { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 85%; padding: 1.5rem; border-radius: 2.5rem; text-align: center; display: none; z-index: 100; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }

        /* Data Cards */
        .card { background: white; border-radius: 1.5rem; padding: 1rem; flex: 1; border: 1px solid #f1f5f9; }
        .sun-card { background: #fffdf5; border-color: #fef3c7; }
        .moon-card { background: #f8faff; border-color: #e0e7ff; }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: #e2e8f0; border-radius: 10px; margin: 1rem 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #4f46e5; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="app-container">
    <header class="flex justify-between items-center mb-4 px-1">
        <h1 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Luminaries Pro</h1>
        <div class="flex gap-2 text-[10px] font-bold text-slate-600 bg-white px-3 py-1 rounded-full border border-slate-100">
            <span>45.2925</span> <span>-66.1132</span>
        </div>
    </header>

    <div class="canvas-box">
        <canvas id="cvs" width="800" height="800"></canvas>
        <div id="tip">
            <p id="tipTitle" class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-1"></p>
            <p id="tipBody" class="text-3xl font-black text-slate-900 leading-none mb-1"></p>
            <p id="tipSub" class="text-[10px] font-bold text-slate-400 uppercase"></p>
        </div>
    </div>

    <div class="flex justify-center gap-4 mb-4">
        <div class="flex items-center gap-1.5 text-[9px] font-black uppercase text-slate-400"><span class="w-2 h-2 rounded-full bg-[#fbbf24]"></span> Day</div>
        <div class="flex items-center gap-1.5 text-[9px] font-black uppercase text-slate-400"><span class="w-2 h-2 rounded-full bg-[#f59e0b]"></span> Golden</div>
        <div class="flex items-center gap-1.5 text-[9px] font-black uppercase text-slate-400"><span class="w-2 h-2 rounded-full bg-[#4f46e5]"></span> Twilight</div>
    </div>

    <div class="flex gap-3 mb-6">
        <div class="card sun-card">
            <div class="flex justify-between items-start mb-2">
                <div><p class="text-[8px] font-black text-amber-500 uppercase">Sunrise</p><p id="riseT" class="text-xl font-black">7:23</p></div>
                <div class="text-right"><p class="text-[8px] font-black text-amber-500 uppercase">Sunset</p><p id="setT" class="text-xl font-black">7:41</p></div>
            </div>
            <p id="dayDur" class="text-[10px] font-black text-amber-600 text-center bg-amber-100/50 py-1 rounded-lg">12H 18M DAY</p>
        </div>
        <div class="card moon-card">
            <div class="flex justify-between items-start mb-2">
                <div><p class="text-[8px] font-black text-indigo-500 uppercase">Moonrise</p><p id="mRise" class="text-xl font-black">9:17</p></div>
                <div class="text-right"><p class="text-[8px] font-black text-indigo-500 uppercase">Moonset</p><p id="mSet" class="text-xl font-black">12:42</p></div>
            </div>
            <p id="mPhase" class="text-[10px] font-black text-indigo-600 text-center bg-indigo-100/50 py-1 rounded-lg uppercase">Waxing Crescent</p>
        </div>
    </div>

    <footer class="mt-auto">
        <div class="text-center mb-1"><span id="dateLabel" class="text-[11px] font-black text-indigo-600 bg-indigo-50 px-4 py-1 rounded-full uppercase">Mar 23</span></div>
        <input type="range" id="sld" min="0" max="365" value="0">
        <button onclick="resetSld()" class="w-full py-3 bg-slate-900 text-white rounded-2xl text-xs font-black uppercase tracking-widest active:scale-95 transition-transform">Now</button>
    </footer>
</div>

<script>
    const cvs = document.getElementById('cvs'), ctx = cvs.getContext('2d'), W = 800, H = 800;
    const sld = document.getElementById('sld'), dateLabel = document.getElementById('dateLabel'), tip = document.getElementById('tip');
    
    let currentSun, currentMoon, tipTimer;
    const lat = 45.2925, lon = -66.1132;

    function fmt(d) { return d ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }) : '--:--'; }

    function render() {
        ctx.clearRect(0, 0, W, H);
        const viewDate = new Date(); 
        viewDate.setDate(viewDate.getDate() + parseInt(sld.value));
        dateLabel.textContent = viewDate.toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase();

        currentSun = SunCalc.getTimes(viewDate, lat, lon);
        currentMoon = SunCalc.getMoonTimes(viewDate, lat, lon);
        const moonIllum = SunCalc.getMoonIllumination(viewDate);

        // Update Cards
        document.getElementById('riseT').textContent = fmt(currentSun.sunrise).split(' ')[0];
        document.getElementById('setT').textContent = fmt(currentSun.sunset).split(' ')[0];
        document.getElementById('mRise').textContent = fmt(currentMoon.rise).split(' ')[0];
        document.getElementById('mSet').textContent = fmt(currentMoon.set).split(' ')[0];

        const getAng = (d) => ( (d.getHours() + d.getMinutes()/60)/24 ) * 2 * Math.PI - Math.PI/2;

        const drawArc = (s, e, c, r, w=60) => {
            if(!s || !e || isNaN(s.getTime())) return;
            ctx.strokeStyle = c; ctx.lineWidth = w; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.arc(400, 400, r, getAng(s), getAng(e)); ctx.stroke();
        };

        // Draw Rings
        drawArc(currentSun.dawn, currentSun.dusk, '#4f46e5', 340); // Twilight
        drawArc(currentSun.sunrise, currentSun.sunset, '#fbbf24', 340); // Day
        drawArc(currentSun.sunrise, currentSun.goldenHourEnd, '#f59e0b', 340, 80); // Golden Rise
        drawArc(currentSun.goldenHour, currentSun.sunset, '#f59e0b', 340, 80); // Golden Set

        // Inner Moon Ring
        if (currentMoon.rise && currentMoon.set) {
            drawArc(currentMoon.rise, currentMoon.set, '#ffffff20', 250, 30);
        }

        // Hour Markers
        ctx.fillStyle = '#ffffff40'; ctx.font = 'bold 20px Inter'; ctx.textAlign = 'center';
        [0, 6, 12, 18].forEach(h => {
            const a = (h/24)*2*Math.PI - Math.PI/2;
            ctx.fillText(h === 0 ? '24' : h, 400 + 385*Math.cos(a), 400 + 385*Math.sin(a));
        });
    }

    cvs.onclick = (e) => {
        const rect = cvs.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (800 / rect.width) - 400;
        const y = (e.clientY - rect.top) * (800 / rect.height) - 400;
        const dist = Math.sqrt(x*x + y*y);
        
        if (dist > 200 && dist < 400) {
            tip.style.display = 'block';
            clearTimeout(tipTimer);
            
            if (dist > 300) { // Solar
                document.getElementById('tipTitle').textContent = "Golden Hour Window";
                document.getElementById('tipBody').textContent = `${fmt(currentSun.goldenHour).split(' ')[0]} — ${fmt(currentSun.sunset)}`;
                document.getElementById('tipSub').textContent = "Perfect Lighting";
            } else { // Moon
                document.getElementById('tipTitle').textContent = "Moon Window";
                document.getElementById('tipBody').textContent = currentMoon.rise ? `${fmt(currentMoon.rise).split(' ')[0]} — ${fmt(currentMoon.set)}` : "Below Horizon";
                document.getElementById('tipSub').textContent = "Lunar Visibility";
            }
            tipTimer = setTimeout(() => tip.style.display = 'none', 4000);
        }
    };

    function resetSld() { sld.value = 0; render(); }
    sld.oninput = render;
    window.onload = render;
</script>

</body>
</html>
