<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luminaries Pro | Saint John</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        html, body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; height: 100dvh; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100%; padding: 0.5rem; padding-top: calc(0.5rem + var(--safe-top)); box-sizing: border-box; max-width: 480px; margin: 0 auto; }
        
        .input-mini { background: #f1f5f9; border-radius: 6px; padding: 4px 8px; font-size: 11px; font-weight: 800; width: 75px; border: 1px solid #e2e8f0; outline: none; color: #0f172a; }
        .visualizer-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; min-height: 0; margin: 0.5rem 0; }
        canvas { height: 100%; width: 100%; object-fit: contain; background: #0f172a; border-radius: 2rem; box-shadow: inset 0 0 40px rgba(0,0,0,0.5); }
        
        .info-hub { background: white; padding: 1.25rem; border-radius: 2rem; border: 1px solid #f1f5f9; box-shadow: 0 -10px 25px rgba(0,0,0,0.02); }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 8px; background: #e2e8f0; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 28px; width: 28px; border-radius: 50%; background: #4f46e5; border: 3px solid white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4); }

        #pop { pointer-events: none; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; transform: scale(0.9) translateY(20px); z-index: 50; }
        #pop.active { opacity: 1; transform: scale(1) translateY(0); }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="grid grid-cols-2 gap-2 mb-2 px-1">
            <div class="flex flex-col">
                <h1 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Luminaries Pro</h1>
                <div class="flex gap-2">
                    <div class="flex items-center gap-1"><span class="text-[9px] font-bold text-slate-400">LAT</span><input type="number" id="latIn" value="45.2925" step="0.0001" class="input-mini"></div>
                    <div class="flex items-center gap-1"><span class="text-[9px] font-bold text-slate-400">LON</span><input type="number" id="lonIn" value="-66.1132" step="0.0001" class="input-mini"></div>
                </div>
            </div>
            <div class="flex flex-col items-end justify-end">
                <div class="flex items-center gap-1"><span class="text-[9px] font-bold text-slate-400">UTC</span><input type="number" id="tzIn" value="-3" class="input-mini !w-[50px]"></div>
            </div>
        </header>

        <main class="visualizer-area">
            <canvas id="cvs" width="800" height="800"></canvas>
            <div id="pop" class="absolute inset-0 flex items-center justify-center p-6">
                <div class="bg-white/95 backdrop-blur-xl p-8 rounded-[3rem] shadow-2xl text-center border border-white">
                    <span id="popL" class="text-[10px] font-black text-indigo-600 uppercase tracking-[0.2em] block mb-2">Phase</span>
                    <div id="popT" class="text-4xl font-black text-slate-900 tabular-nums tracking-tight">--:--</div>
                </div>
            </div>
        </main>

        <div class="flex justify-center gap-2 mb-4">
            <button onclick="popShow('Day')" class="flex items-center gap-2 bg-white px-4 py-2 rounded-2xl border border-slate-100 shadow-sm active:scale-95 transition-all">
                <div class="w-2 h-2 rounded-full bg-[#fbbf24]"></div><span class="text-[10px] font-black text-slate-500 uppercase">Day</span>
            </button>
            <button onclick="popShow('Golden')" class="flex items-center gap-2 bg-white px-4 py-2 rounded-2xl border border-slate-100 shadow-sm active:scale-95 transition-all">
                <div class="w-2 h-2 rounded-full bg-[#f59e0b]"></div><span class="text-[10px] font-black text-slate-500 uppercase">Golden</span>
            </button>
            <button onclick="popShow('Twilight')" class="flex items-center gap-2 bg-white px-4 py-2 rounded-2xl border border-slate-100 shadow-sm active:scale-95 transition-all">
                <div class="w-2 h-2 rounded-full bg-[#4f46e5]"></div><span class="text-[10px] font-black text-slate-500 uppercase">Twilight</span>
            </button>
        </div>

        <footer class="info-hub">
            <div class="flex gap-3 mb-6">
                <div class="flex-1 bg-amber-50/50 rounded-3xl p-4 border border-amber-100/50 cursor-pointer active:scale-95 transition-transform" onclick="popShow('Day')">
                    <div class="flex justify-between mb-4">
                        <div><p class="text-[8px] font-black text-amber-600 uppercase">Sunrise</p><p id="riseT" class="text-xl font-black text-slate-900">--:--</p></div>
                        <div class="text-right"><p class="text-[8px] font-black text-amber-600 uppercase">Sunset</p><p id="setT" class="text-xl font-black text-slate-900">--:--</p></div>
                    </div>
                    <div id="dayL" class="text-[10px] font-black text-amber-700 text-center bg-white/80 py-2 rounded-xl border border-amber-100">--H --M DAY</div>
                </div>
                <div class="flex-1 bg-indigo-50/50 rounded-3xl p-4 border border-indigo-100/50 cursor-pointer active:scale-95 transition-transform" onclick="popShow('Moon')">
                    <div class="flex justify-between mb-4">
                        <div><p class="text-[8px] font-black text-indigo-600 uppercase">Moonrise</p><p id="mRise" class="text-xl font-black text-slate-900">--:--</p></div>
                        <div class="text-right"><p class="text-[8px] font-black text-indigo-600 uppercase">Moonset</p><p id="mSet" class="text-xl font-black text-slate-900">--:--</p></div>
                    </div>
                    <div id="mPhase" class="text-[10px] font-black text-indigo-700 text-center bg-white/80 py-2 rounded-xl border border-indigo-100 uppercase">Phase</div>
                </div>
            </div>

            <div class="flex flex-col items-center gap-4">
                <div id="dateD" class="bg-indigo-600 text-white text-[11px] font-black px-6 py-2 rounded-full tracking-widest uppercase shadow-lg shadow-indigo-200">MAR 23</div>
                <div class="flex items-center gap-4 w-full">
                    <input type="range" id="sld" min="0" max="365" value="0" class="flex-1">
                    <button id="resetBtn" class="bg-slate-900 text-white text-[11px] font-black px-6 py-3 rounded-2xl uppercase shadow-xl active:scale-95 transition-all">Now</button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('cvs'), ctx = canvas.getContext('2d'), W = 800, H = 800;
        const latIn = document.getElementById('latIn'), lonIn = document.getElementById('lonIn'), tzIn = document.getElementById('tzIn');
        const sld = document.getElementById('sld'), dateD = document.getElementById('dateD');
        const pop = document.getElementById('pop'), popL = document.getElementById('popL'), popT = document.getElementById('popT');
        
        let currentSun = null, currentMoon = null, timer = null;

        function fmt(d) {
            if (!d || isNaN(d.getTime())) return '--:--';
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true }).replace(' AM', 'am').replace(' PM', 'pm');
        }

        const getAngle = (date) => {
            const h = date.getHours() + date.getMinutes() / 60 + date.getSeconds() / 3600;
            return (h / 24) * 2 * Math.PI - Math.PI / 2;
        };

        function drawArc(start, end, color, radius, width = 65) {
            if (!start || !end || isNaN(start.getTime())) return;
            ctx.strokeStyle = color; ctx.lineWidth = width; ctx.lineCap = 'butt';
            ctx.beginPath(); ctx.arc(400, 400, radius, getAngle(start), getAngle(end)); ctx.stroke();
        }

        function render() {
            ctx.clearRect(0, 0, W, H);
            const lat = parseFloat(latIn.value) || 45.2925, lon = parseFloat(lonIn.value) || -66.1132, offset = parseFloat(tzIn.value) || -3;
            
            const nowUTC = new Date();
            const localNow = new Date(nowUTC.getTime() + (nowUTC.getTimezoneOffset() * 60000) + (offset * 3600000));
            const viewDate = new Date(localNow);
            viewDate.setDate(viewDate.getDate() + parseInt(sld.value));

            dateD.textContent = viewDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase();
            
            try {
                currentSun = SunCalc.getTimes(viewDate, lat, lon);
                currentMoon = SunCalc.getMoonTimes(viewDate, lat, lon);
                const mIllum = SunCalc.getMoonIllumination(viewDate);

                // Update UI Text
                document.getElementById('riseT').textContent = fmt(currentSun.sunrise).split(' ')[0];
                document.getElementById('setT').textContent = fmt(currentSun.sunset).split(' ')[0];
                document.getElementById('mRise').textContent = currentMoon.rise ? fmt(currentMoon.rise).split(' ')[0] : '---';
                document.getElementById('mSet').textContent = currentMoon.set ? fmt(currentMoon.set).split(' ')[0] : '---';
                const diff = (currentSun.sunset - currentSun.sunrise) / 3600000;
                document.getElementById('dayL').textContent = `${Math.floor(diff)}H ${Math.round((diff % 1) * 60)}M DAY`;
                const phases = ["New Moon", "Waxing Crescent", "First Quarter", "Waxing Gibbous", "Full Moon", "Waning Gibbous", "Last Quarter", "Waning Crescent"];
                document.getElementById('mPhase').textContent = phases[Math.floor(mIllum.phase * 8) % 8];

                // Draw Scale
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                for (let i = 0; i < 24; i++) {
                    const ang = (i / 24) * 2 * Math.PI - Math.PI / 2;
                    const isMajor = i % 6 === 0;
                    ctx.fillStyle = isMajor ? '#f8fafc' : '#334155';
                    ctx.font = isMajor ? '900 28px Inter' : '600 12px Inter';
                    if (isMajor) ctx.fillText(i === 0 ? '24' : i, 400 + 375 * Math.cos(ang), 400 + 375 * Math.sin(ang));
                    else { ctx.beginPath(); ctx.arc(400 + 370 * Math.cos(ang), 400 + 370 * Math.sin(ang), 2.5, 0, Math.PI * 2); ctx.fill(); }
                }

                // Draw Rings
                drawArc(new Date(viewDate).setHours(0,0,0), new Date(viewDate).setHours(23,59,59), '#1e293b', 335);
                drawArc(currentSun.dawn, currentSun.dusk, '#4f46e5', 335);
                drawArc(currentSun.sunrise, currentSun.sunset, '#fbbf24', 335);
                drawArc(currentSun.sunrise, currentSun.goldenHourEnd, '#f59e0b', 335, 90);
                drawArc(currentSun.goldenHour, currentSun.sunset, '#f59e0b', 335, 90);

                drawArc(new Date(viewDate).setHours(0,0,0), new Date(viewDate).setHours(23,59,59), '#1e293b', 260, 40);
                if (currentMoon.rise && currentMoon.set) {
                    if (currentMoon.rise < currentMoon.set) drawArc(currentMoon.rise, currentMoon.set, '#cbd5e1', 260, 40);
                    else { 
                        drawArc(currentMoon.rise, new Date(viewDate).setHours(23,59,59), '#cbd5e1', 260, 40); 
                        drawArc(new Date(viewDate).setHours(0,0,0), currentMoon.set, '#cbd5e1', 260, 40); 
                    }
                }

                // DRAW CLOCK (Must be last to stay on top)
                const hAng = getAngle(localNow);
                ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 14; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(400, 400); ctx.lineTo(400 + 350 * Math.cos(hAng), 400 + 350 * Math.sin(hAng)); ctx.stroke();
                
                ctx.fillStyle = '#f8fafc'; ctx.font = '900 140px Inter';
                ctx.fillText(`${String(localNow.getHours()).padStart(2, '0')}:${String(localNow.getMinutes()).padStart(2, '0')}`, 400, 435);
            } catch(e) { console.error("Render failed", e); }
        }

        function popShow(type) {
            if (!currentSun) return;
            pop.classList.add('active');
            clearTimeout(timer);
            if(type === 'Day') { popL.textContent = "Daylight"; popT.textContent = `${fmt(currentSun.sunrise)} - ${fmt(currentSun.sunset)}`; }
            if(type === 'Golden') { popL.textContent = "Golden Hour"; popT.textContent = `${fmt(currentSun.goldenHour)} - ${fmt(currentSun.sunset)}`; }
            if(type === 'Twilight') { popL.textContent = "Twilight"; popT.textContent = `${fmt(currentSun.dawn)} - ${fmt(currentSun.dusk)}`; }
            if(type === 'Moon') { popL.textContent = "Lunar Window"; popT.textContent = currentMoon.rise ? `${fmt(currentMoon.rise)} - ${fmt(currentMoon.set)}` : "No Rise Today"; }
            timer = setTimeout(() => pop.classList.remove('active'), 3500);
        }

        [sld, latIn, lonIn, tzIn].forEach(el => el.oninput = render);
        document.getElementById('resetBtn').onclick = () => { sld.value = 0; render(); };
        window.onload = () => { render(); setInterval(render, 30000); };
    </script>
</body>
</html>
