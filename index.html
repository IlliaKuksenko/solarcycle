<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luminaries Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        html, body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; height: 100dvh; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100%; padding: 0.4rem; padding-top: calc(0.2rem + var(--safe-top)); box-sizing: border-box; max-width: 480px; margin: 0 auto; }
        
        .settings-bar { background: white; border-radius: 0.75rem; padding: 0.4rem; border: 1px solid #f1f5f9; display: flex; gap: 0.4rem; align-items: center; flex-shrink: 0; margin-bottom: 0.4rem; }
        .input-group { background: #f8fafc; border-radius: 0.5rem; padding: 0.2rem 0.5rem; border: 1px solid #f1f5f9; display: flex; align-items: center; flex: 1; }
        .input-group span { font-size: 7px; font-weight: 900; color: #94a3b8; margin-right: 4px; }
        .input-group input { background: transparent; width: 100%; font-size: 11px; font-weight: 700; outline: none; color: #334155; }
        
        .visualizer-area { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; position: relative; cursor: pointer; }
        canvas { height: 100%; width: 100%; object-fit: contain; background: white; border-radius: 1.25rem; transition: background-color 0.5s ease; }
        
        .info-hub { background: white; padding: 1rem; border-radius: 1.5rem; box-shadow: 0 -4px 25px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; flex-shrink: 0; margin-bottom: var(--safe-bottom); }
        
        #phaseInfo { pointer-events: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; transform: scale(0.95); z-index: 50; }
        #phaseInfo.active { opacity: 1; transform: scale(1); }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: #e2e8f0; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #4f46e5; border: 3px solid white; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="flex justify-between items-center px-2 mb-1 flex-shrink-0">
            <h1 class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Luminaries Pro</h1>
            <div id="dateD" class="text-[9px] font-black text-indigo-600 uppercase bg-indigo-50 px-3 py-0.5 rounded-full">MAR 23</div>
        </header>

        <section class="settings-bar">
            <div class="input-group"><span>LAT</span><input type="number" id="latIn" value="45.2925" step="0.0001"></div>
            <div class="input-group"><span>LON</span><input type="number" id="lonIn" value="-66.1132" step="0.0001"></div>
            <div class="px-2 font-black text-[10px] text-slate-400">UTC-3</div>
        </section>

        <main class="visualizer-area">
            <canvas id="cvs" width="800" height="800"></canvas>
            <div id="phaseInfo" class="absolute inset-0 flex flex-col items-center justify-center">
                <div class="bg-white/95 backdrop-blur-xl px-8 py-5 rounded-[2.5rem] border border-white shadow-2xl text-center">
                    <span id="phaseLabel" class="text-[10px] font-black text-indigo-600 uppercase tracking-widest block mb-1">PHASE</span>
                    <div class="text-3xl font-black text-slate-900 tabular-nums" id="phaseRange">--:--</div>
                </div>
            </div>
        </main>

        <footer class="info-hub">
            <div class="flex items-stretch gap-3 mb-4">
                <div class="flex-1 bg-amber-50/50 rounded-2xl p-3 border border-amber-100/50 text-center">
                    <span class="text-[7px] font-black text-amber-600 uppercase">Sun</span>
                    <div class="flex flex-col gap-1 mt-1">
                        <time id="riseT" class="text-sm font-black text-slate-900">--:--</time>
                        <time id="setT" class="text-sm font-black text-slate-900">--:--</time>
                    </div>
                </div>

                <div class="flex-[1.5] flex flex-col gap-2">
                    <div id="dayL" class="flex-1 flex items-center justify-center text-[10px] font-black text-amber-700 bg-amber-100/40 rounded-xl border border-amber-200/30 uppercase tracking-tighter">--H --M DAY</div>
                    <div id="nightL" class="flex-1 flex items-center justify-center text-[10px] font-black text-indigo-700 bg-indigo-100/40 rounded-xl border border-indigo-200/30 uppercase tracking-tighter">--H --M NIGHT</div>
                </div>

                <div class="flex-1 bg-indigo-50/50 rounded-2xl p-3 border border-indigo-100/50 text-center">
                    <span class="text-[7px] font-black text-indigo-600 uppercase">Moon</span>
                    <div class="flex flex-col gap-1 mt-1">
                        <time id="mRise" class="text-sm font-black text-slate-900">--:--</time>
                        <time id="mSet" class="text-sm font-black text-slate-900">--:--</time>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <input type="range" id="sld" min="0" max="365" value="0" class="flex-1">
                <button id="resetBtn" class="text-[11px] font-black text-indigo-600 uppercase bg-indigo-50 px-4 py-2 rounded-xl">Now</button>
            </div>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('cvs'), ctx = canvas.getContext('2d'), W = 800, H = 800, R = 340, R_MOON = 265;
        const latIn = document.getElementById('latIn'), lonIn = document.getElementById('lonIn'), sld = document.getElementById('sld');
        const riseT = document.getElementById('riseT'), setT = document.getElementById('setT'), dayL = document.getElementById('dayL'), nightL = document.getElementById('nightL');
        const mRise = document.getElementById('mRise'), mSet = document.getElementById('mSet'), pInfo = document.getElementById('phaseInfo');

        let currentSun = null, currentMoon = null;

        function fmt(d) {
            if (!d || isNaN(d.getTime())) return '--:--';
            let hr = d.getHours(), mn = d.getMinutes();
            return `${hr % 12 || 12}:${String(mn).padStart(2, '0')} ${hr >= 12 ? 'PM' : 'AM'}`;
        }

        const getPos = (d) => {
            const h = d.getHours() + d.getMinutes()/60 + d.getSeconds()/3600;
            return (h/24)*2*Math.PI-Math.PI/2;
        };

        function render() {
            ctx.clearRect(0, 0, W, H);
            const lat = parseFloat(latIn.value), lon = parseFloat(lonIn.value);
            const targetNow = new Date();
            const viewDate = new Date(targetNow);
            viewDate.setDate(viewDate.getDate() + parseInt(sld.value));

            currentSun = SunCalc.getTimes(viewDate, lat, lon);
            currentMoon = SunCalc.getMoonTimes(viewDate, lat, lon);

            // Update Ribbon
            riseT.textContent = fmt(currentSun.sunrise).split(' ')[0];
            setT.textContent = fmt(currentSun.sunset).split(' ')[0];
            mRise.textContent = currentMoon.rise ? fmt(currentMoon.rise).split(' ')[0] : '---';
            mSet.textContent = currentMoon.set ? fmt(currentMoon.set).split(' ')[0] : '---';

            const dayLen = (currentSun.sunset - currentSun.sunrise) / 3600000;
            dayL.textContent = `${Math.floor(dayLen)}H ${Math.round((dayLen%1)*60)}M DAY`;
            nightL.textContent = `${Math.floor(24-dayLen)}H ${Math.round(((24-dayLen)%1)*60)}M NIGHT`;

            const isNight = targetNow < currentSun.sunrise || targetNow > currentSun.sunset;
            canvas.style.backgroundColor = isNight ? '#0f172a' : '#ffffff';
            const textColor = isNight ? '#f8fafc' : '#1e293b';

            // 1. Time Indicators (Scale)
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            for (let i = 0; i < 24; i++) {
                const ang = (i/24)*2*Math.PI - Math.PI/2;
                const isMajor = i % 6 === 0;
                ctx.fillStyle = isMajor ? textColor : (isNight ? '#334155' : '#cbd5e1');
                ctx.font = isMajor ? '900 24px Inter' : '600 12px Inter';
                if (isMajor) ctx.fillText(i === 0 ? '24' : i, 400 + 380 * Math.cos(ang), 400 + 380 * Math.sin(ang));
                else {
                    ctx.beginPath();
                    ctx.arc(400 + 375 * Math.cos(ang), 400 + 375 * Math.sin(ang), 2, 0, Math.PI*2);
                    ctx.fill();
                }
            }

            const drawArc = (s, e, c, rad, w=60) => {
                ctx.strokeStyle = c; ctx.lineWidth = w; ctx.beginPath();
                ctx.arc(400, 400, rad, getPos(s), getPos(e)); ctx.stroke();
            };

            // 2. The Rings
            drawArc(new Date(viewDate).setHours(0,0), new Date(viewDate).setHours(23,59), isNight ? '#1e293b' : '#f1f5f9', R);
            drawArc(currentSun.sunrise, currentSun.sunset, '#fbbf24', R);
            drawArc(currentSun.sunrise, currentSun.goldenHourEnd, '#f59e0b', R, 75);
            drawArc(currentSun.goldenHour, currentSun.sunset, '#f59e0b', R, 75);

            if (currentMoon.rise && currentMoon.set) {
                const mC = isNight ? '#475569' : '#cbd5e1';
                if (currentMoon.rise < currentMoon.set) drawArc(currentMoon.rise, currentMoon.set, mC, R_MOON, 30);
                else {
                    drawArc(currentMoon.rise, new Date(viewDate).setHours(23,59,59), mC, R_MOON, 30);
                    drawArc(new Date(viewDate).setHours(0,0,0), currentMoon.set, mC, R_MOON, 30);
                }
            }

            // 3. The Hand
            const hAng = getPos(targetNow);
            ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 12; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(400, 400); 
            ctx.lineTo(400 + 350 * Math.cos(hAng), 400 + 350 * Math.sin(hAng)); ctx.stroke();

            ctx.fillStyle = textColor; ctx.font = '900 120px Inter';
            ctx.fillText(`${String(targetNow.getHours()).padStart(2,'0')}:${String(targetNow.getMinutes()).padStart(2,'0')}`, 400, 440);
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (800 / rect.width) - 400;
            const y = (e.clientY - rect.top) * (800 / rect.height) - 400;
            const dist = Math.sqrt(x*x + y*y);
            const angle = Math.atan2(y, x) + Math.PI/2;
            const norm = angle < 0 ? angle + 2*Math.PI : angle;

            const check = (s, e) => {
                const start = getPos(s) + Math.PI/2, end = getPos(e) + Math.PI/2;
                return start < end ? (norm >= start && norm <= end) : (norm >= start || norm <= end);
            };

            if (dist > 280 && dist < 390) {
                if (check(currentSun.sunrise, currentSun.goldenHourEnd) || check(currentSun.goldenHour, currentSun.sunset)) showPop("Golden Hour", `${fmt(currentSun.sunrise)} - ${fmt(currentSun.goldenHourEnd)}`);
                else if (check(currentSun.sunrise, currentSun.sunset)) showPop("Daylight", `${fmt(currentSun.sunrise)} - ${fmt(currentSun.sunset)}`);
                else showPop("Night", `${fmt(currentSun.sunset)} - ${fmt(currentSun.sunrise)}`);
            }
        });

        function showPop(l, r) {
            document.getElementById('phaseLabel').textContent = l;
            document.getElementById('phaseRange').textContent = r;
            pInfo.classList.add('active');
            setTimeout(() => pInfo.classList.remove('active'), 3000);
        }

        sld.oninput = render;
        window.onload = () => { render(); setInterval(render, 1000); };
    </script>
</body>
</html>
