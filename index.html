<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SolarCycle Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        html, body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; height: 100dvh; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100%; padding: 0.5rem; padding-top: calc(0.5rem + var(--safe-top)); box-sizing: border-box; max-width: 420px; margin: 0 auto; }
        .settings-panel { background: white; border-radius: 1.25rem; padding: 0.75rem; border: 1px solid #f1f5f9; margin-bottom: 0.5rem; flex-shrink: 0; }
        .visualizer-area { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0.25rem 0; }
        canvas { max-height: 100%; max-width: 100%; aspect-ratio: 1/1; background: white; border-radius: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .info-hub { background: white; padding: 1rem; border-radius: 1.75rem; box-shadow: 0 -5px 30px rgba(0,0,0,0.06); border: 1px solid #f1f5f9; flex-shrink: 0; margin-bottom: var(--safe-bottom); }
        .fav-btn { font-size: 9px; font-weight: 800; padding: 6px 12px; border-radius: 8px; text-transform: uppercase; border: 1px solid #e2e8f0; background: #f8fafc; color: #64748b; }
        .fav-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: #e2e8f0; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #4f46e5; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="flex justify-between items-center px-2 mb-2 flex-shrink-0">
            <h1 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">SolarCycle Sync</h1>
            <div class="flex gap-1.5" id="tabs">
                <button onclick="useCurrentLoc(this)" id="btnCurrent" class="fav-btn active">Current</button>
                <button onclick="loadSavedLoc(this)" id="btnSaved" class="fav-btn">Favorite</button>
            </div>
        </header>

        <section class="settings-panel">
            <div class="flex gap-2 items-end">
                <div class="flex-1">
                    <label class="text-[8px] font-black text-slate-400 block mb-1 uppercase">Lat</label>
                    <input type="number" id="latIn" value="45.27" step="0.0001" class="w-full p-2 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100 text-center">
                </div>
                <div class="flex-1">
                    <label class="text-[8px] font-black text-slate-400 block mb-1 uppercase">Lon</label>
                    <input type="number" id="lonIn" value="-66.06" step="0.0001" class="w-full p-2 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100 text-center">
                </div>
                <button onclick="saveToFavorite()" class="h-[34px] px-3 bg-indigo-50 text-indigo-600 rounded-xl active:scale-90">★</button>
                <button id="resetBtn" class="h-[34px] px-3 bg-slate-900 text-white rounded-xl text-[9px] font-black uppercase">Sync</button>
            </div>
        </section>

        <main class="visualizer-area"><canvas id="cvs" width="600" height="600"></canvas></main>

        <footer class="info-hub">
            <div class="flex justify-between items-center mb-4 pb-4 border-b border-slate-50">
                <div class="text-left">
                    <p class="text-[9px] font-black text-amber-500 uppercase mb-1">☼ Sunrise</p>
                    <time id="riseT" class="text-3xl font-black text-slate-900 tracking-tight">--:--</time>
                    <p id="dayL" class="text-[8px] font-bold text-slate-400 mt-1 uppercase">-- Day</p>
                </div>
                <div class="bg-slate-100 px-3 py-1 rounded-full"><span id="dateD" class="text-[10px] font-black text-slate-600">--</span></div>
                <div class="text-right">
                    <p class="text-[9px] font-black text-indigo-500 uppercase mb-1">Sunset ☼</p>
                    <time id="setT" class="text-3xl font-black text-slate-900 tracking-tight">--:--</time>
                    <p id="nightL" class="text-[8px] font-bold text-slate-400 mt-1 uppercase">-- Night</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <input type="range" id="sld" min="0" max="365" value="0" class="flex-1">
                <div id="liveLabel" class="text-[10px] font-black text-indigo-600 uppercase">Live</div>
            </div>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('cvs'), ctx = canvas.getContext('2d'), W = 600, H = 600, R = 220;
        const latIn = document.getElementById('latIn'), lonIn = document.getElementById('lonIn'), sld = document.getElementById('sld');
        const dateD = document.getElementById('dateD'), riseT = document.getElementById('riseT'), setT = document.getElementById('setT');
        const dayL = document.getElementById('dayL'), nightL = document.getElementById('nightL'), btnSaved = document.getElementById('btnSaved');

        function toDec(d) { return d ? d.getHours() + d.getMinutes()/60 + d.getSeconds()/3600 : null; }
        function fmt(h) {
            if (h === null) return '--:--';
            const hr = Math.floor(h) % 24, mn = Math.floor((h % 1) * 60);
            return `${hr % 12 || 12}:${String(mn).padStart(2, '0')} ${hr >= 12 ? 'PM' : 'AM'}`;
        }

        function render() {
            ctx.clearRect(0, 0, W, H);
            const lat = parseFloat(latIn.value), lon = parseFloat(lonIn.value);
            const now = new Date();
            const viewDate = new Date();
            viewDate.setDate(viewDate.getDate() + parseInt(sld.value));
            
            dateD.textContent = viewDate.toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase();
            
            const times = SunCalc.getTimes(viewDate, lat, lon);
            const sun = {
                dawn: toDec(times.dawn),
                rise: toDec(times.sunrise),
                ghStart: toDec(times.goldenHourEnd),
                ghEnd: toDec(times.goldenHour),
                set: toDec(times.sunset),
                night: toDec(times.night),
                noon: toDec(times.solarNoon)
            };

            riseT.textContent = fmt(sun.rise); setT.textContent = fmt(sun.set);
            if (sun.rise) {
                const dl = (sun.set - sun.rise + 24) % 24;
                dayL.textContent = `${Math.floor(dl)}H ${Math.round((dl%1)*60)}M DAY`;
                nightL.textContent = `${Math.floor(24-dl)}H ${Math.round(((24-dl)%1)*60)}M NIGHT`;
            }

            const arc = (s, e, c, w=80) => {
                if (s === null || e === null) return;
                ctx.strokeStyle = c; ctx.lineWidth = w; ctx.beginPath();
                ctx.arc(300, 300, R, (s/24)*2*Math.PI-Math.PI/2, (e/24)*2*Math.PI-Math.PI/2);
                ctx.stroke();
            };

            // Drawing the Clock Ring
            arc(0, 24, '#0f172a'); // Night
            arc(sun.dawn, sun.night, '#4f46e5'); // Twilight
            arc(sun.rise, sun.set, '#fbbf24'); // Day
            arc(sun.rise, sun.ghStart, '#f59e0b', 85); // Golden Hour Morning
            arc(sun.ghEnd, sun.set, '#f59e0b', 85); // Golden Hour Evening

            // Solar Noon Tick
            if (sun.noon) {
                const ang = (sun.noon/24)*2*Math.PI-Math.PI/2;
                ctx.strokeStyle = 'white'; ctx.lineWidth = 4; ctx.beginPath();
                ctx.moveTo(300 + 180*Math.cos(ang), 300 + 180*Math.sin(ang));
                ctx.lineTo(300 + 260*Math.cos(ang), 300 + 260*Math.sin(ang));
                ctx.stroke();
            }

            // Dial Numbers
            ctx.textAlign = 'center'; ctx.fillStyle = '#1e293b'; ctx.font = 'bold 14px Inter';
            for (let i = 0; i < 24; i += 3) {
                const a = (i/24)*2*Math.PI-Math.PI/2;
                ctx.fillText(i === 0 ? '24' : i, 300 + 285*Math.cos(a), 300 + 285*Math.sin(a));
            }

            // Red Hand (Always Local Time)
            const curH = toDec(now);
            ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.beginPath();
            ctx.moveTo(300, 300);
            ctx.lineTo(300 + 200*Math.cos((curH/24)*2*Math.PI-Math.PI/2), 300 + 200*Math.sin((curH/24)*2*Math.PI-Math.PI/2));
            ctx.stroke();

            // Digital Center
            ctx.fillStyle = '#1e293b'; ctx.font = '900 80px Inter';
            const dispH = String(now.getHours()).padStart(2, '0'), dispM = String(now.getMinutes()).padStart(2, '0');
            ctx.fillText(`${dispH}:${dispM}`, 300, 310);
        }

        function saveToFavorite() {
            const name = prompt("Name this favorite:");
            if (name) {
                localStorage.setItem('solarFav', JSON.stringify({ name: name.toUpperCase(), lat: latIn.value, lon: lonIn.value }));
                updateFavUI();
            }
        }
        function updateFavUI() {
            const s = JSON.parse(localStorage.getItem('solarFav'));
            if (s) btnSaved.innerText = s.name;
        }
        function loadSavedLoc(btn) {
            const s = JSON.parse(localStorage.getItem('solarFav'));
            if (s) { latIn.value = s.lat; lonIn.value = s.lon; setActive(btn); }
        }
        function useCurrentLoc(btn) {
            navigator.geolocation.getCurrentPosition(p => {
                latIn.value = p.coords.latitude.toFixed(4); lonIn.value = p.coords.longitude.toFixed(4);
                setActive(btn);
            });
        }
        function setActive(btn) {
            document.querySelectorAll('.fav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); render();
        }

        document.getElementById('resetBtn').onclick = () => { sld.value = 0; render(); };
        sld.oninput = render; latIn.oninput = render; lonIn.oninput = render;
        window.onload = () => { updateFavUI(); render(); setInterval(render, 1000); };
    </script>
</body>
</html>
