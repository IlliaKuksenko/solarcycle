<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luminaries Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%234f46e5'/><stop offset='100%' stop-color='%23fbbf24'/></linearGradient></defs><circle cx='50' cy='50' r='50' fill='url(%23g)'/><path d='M50 10 A40 40 0 0 1 50 90 A25 25 0 0 0 50 10 Z' fill='white' opacity='0.8'/></svg>" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        html, body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; height: 100dvh; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100%; padding: 0.4rem; padding-top: calc(0.2rem + var(--safe-top)); box-sizing: border-box; max-width: 480px; margin: 0 auto; opacity: 0; transition: opacity 0.8s ease; }
        .app-container.ready { opacity: 1; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity 1s ease, visibility 1s; }
        #splash.fade-out { opacity: 0; visibility: hidden; }
        .logo-sun-moon { width: 120px; height: 120px; filter: drop-shadow(0 0 15px rgba(251,191,36,0.3)); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

        .settings-bar { background: white; border-radius: 0.75rem; padding: 0.4rem; border: 1px solid #f1f5f9; display: flex; gap: 0.4rem; align-items: center; flex-shrink: 0; margin-bottom: 0.4rem; }
        .input-group { background: #f8fafc; border-radius: 0.5rem; padding: 0.2rem 0.5rem; border: 1px solid #f1f5f9; display: flex; align-items: center; flex: 1; }
        .input-group span { font-size: 7px; font-weight: 900; color: #94a3b8; margin-right: 4px; }
        .input-group input { background: transparent; width: 100%; font-size: 11px; font-weight: 700; outline: none; color: #334155; }
        .btn-tiny { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #64748b; background: white; border-radius: 4px; cursor: pointer; border: 1px solid #f1f5f9; }

        .visualizer-area { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; position: relative; width: 100%; }
        canvas { width: 100%; height: auto; max-height: 100%; aspect-ratio: 1/1; object-fit: contain; background: white; border-radius: 1.5rem; transition: background-color 0.5s ease; }
        
        #tip { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 14px; border-radius: 12px; border: 1px solid #f1f5f9; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); width: 85%; display: none; z-index: 50; pointer-events: none; }
        .info-hub { background: white; padding: 1rem; border-radius: 1.5rem; border: 1px solid #f1f5f9; flex-shrink: 0; margin-bottom: var(--safe-bottom); }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 5px; background: #e2e8f0; border-radius: 10px; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 22px; width: 22px; border-radius: 50%; background: #4f46e5; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="splash">
        <svg class="logo-sun-moon mb-6" viewBox="0 0 100 100">
            <path d="M50 10 A40 40 0 0 1 50 90 A25 25 0 0 0 50 10 Z" fill="white" opacity="0.9"/>
            <path d="M50 30 A20 20 0 0 0 50 70 A20 20 0 0 1 50 30 Z" fill="#fbbf24"/>
            <path d="M50 30 A20 20 0 0 0 50 70 A12 12 0 0 1 50 30 Z" fill="#0f172a"/>
            <circle cx="50" cy="50" r="8" fill="#4f46e5"/>
        </svg>
        <h2 class="text-3xl font-black text-white tracking-widest uppercase">Luminaries</h2>
    </div>

    <div class="app-container" id="app">
        <header class="flex justify-between items-center px-2 mb-1">
            <h1 class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Atmosphere Sync</h1>
            <div class="text-[7px] font-black text-indigo-500 uppercase bg-indigo-50 px-2 py-0.5 rounded-md">Live</div>
        </header>

        <section class="settings-bar">
            <div class="input-group"><span>LAT</span><input type="number" id="latIn" value="45.2925" step="0.0001"></div>
            <div class="input-group"><span>LON</span><input type="number" id="lonIn" value="-66.1132" step="0.0001"></div>
            <div class="flex gap-1">
                <button onclick="saveLoc()" class="btn-tiny" title="Save">💾</button>
                <button onclick="adjTZ(-1)" class="btn-tiny">-</button>
                <span id="tzLabel" class="text-[9px] font-black min-w-[32px] text-center">UTC-3</span>
                <button onclick="adjTZ(1)" class="btn-tiny">+</button>
            </div>
        </section>

        <main class="visualizer-area">
            <canvas id="cvs" width="800" height="800"></canvas>
            <div id="tip">
                <div class="flex items-center gap-2 mb-1">
                    <div id="tipColor" class="w-2.5 h-2.5 rounded-full"></div>
                    <span id="tipTitle" class="text-[11px] font-black uppercase tracking-tighter"></span>
                </div>
                <p id="tipBody" class="text-[10px] text-slate-500 font-medium"></p>
            </div>
        </main>

        <div class="flex gap-2 overflow-x-auto py-2 flex-shrink-0 no-scrollbar justify-start px-2">
            <button onclick="showTip('Day', 'Full sunlight.', '#fbbf24')" class="flex items-center gap-1.5 bg-white px-3 py-2 rounded-xl border border-slate-100 text-[9px] font-black text-slate-500 uppercase whitespace-nowrap"><span class="w-2 h-2 rounded-full bg-[#fbbf24]"></span> Day</button>
            <button onclick="showTip('Golden', 'Warm soft light.', '#f59e0b')" class="flex items-center gap-1.5 bg-white px-3 py-2 rounded-xl border border-slate-100 text-[9px] font-black text-slate-500 uppercase whitespace-nowrap"><span class="w-2 h-2 rounded-full bg-[#f59e0b]"></span> Golden</button>
            <button onclick="showTip('Twilight', 'Blue hour (Civil, Nautical, Astro).', '#4f46e5')" class="flex items-center gap-1.5 bg-white px-3 py-2 rounded-xl border border-slate-100 text-[9px] font-black text-slate-500 uppercase whitespace-nowrap"><span class="w-2 h-2 rounded-full bg-[#4f46e5]"></span> Twilight</button>
            <button onclick="showTip('Moon', 'Lunar visibility.', '#cbd5e1')" class="flex items-center gap-1.5 bg-white px-3 py-2 rounded-xl border border-slate-100 text-[9px] font-black text-slate-500 uppercase whitespace-nowrap"><span class="w-2 h-2 rounded-full bg-[#cbd5e1]"></span> Moon</button>
            <button onclick="showTip('Night', 'Full darkness.', '#0f172a')" class="flex items-center gap-1.5 bg-white px-3 py-2 rounded-xl border border-slate-100 text-[9px] font-black text-slate-500 uppercase whitespace-nowrap"><span class="w-2 h-2 rounded-full bg-[#0f172a]"></span> Night</button>
        </div>

        <footer class="info-hub">
            <div class="flex gap-3 mb-4">
                <div class="flex-1 bg-amber-50/40 border border-amber-100 rounded-2xl p-3 flex flex-col justify-between">
                    <div class="flex justify-between items-start">
                        <div class="flex flex-col"><span class="text-[7px] font-black text-amber-600 uppercase">Rise</span><time id="riseT" class="text-base font-black text-slate-900 leading-none">--:--</time></div>
                        <div class="flex flex-col items-end"><span class="text-[7px] font-black text-amber-600 uppercase">Set</span><time id="setT" class="text-base font-black text-slate-900 leading-none">--:--</time></div>
                    </div>
                    <div class="mt-3 space-y-1">
                        <div id="dayL" class="text-[8px] font-black text-amber-700 bg-white py-1 rounded-lg text-center shadow-sm">--H --M DAY</div>
                        <div id="nightL" class="text-[8px] font-black text-slate-400 bg-slate-100/50 py-1 rounded-lg text-center">--H --M NIGHT</div>
                    </div>
                </div>
                <div class="flex-1 bg-indigo-50/40 border border-indigo-100 rounded-2xl p-3 flex flex-col justify-between">
                    <div class="flex justify-between items-start">
                        <div class="flex flex-col"><span class="text-[7px] font-black text-indigo-600 uppercase">Moonrise</span><time id="mRise" class="text-base font-black text-slate-900 leading-none">--:--</time></div>
                        <div class="flex flex-col items-end"><span class="text-[7px] font-black text-indigo-600 uppercase">Moonset</span><time id="mSet" class="text-base font-black text-slate-900 leading-none">--:--</time></div>
                    </div>
                    <div id="mPhase" class="mt-3 text-[8px] font-black text-indigo-700 bg-white py-2 rounded-lg text-center shadow-sm tracking-widest uppercase">PHASE</div>
                </div>
            </div>

            <div class="flex flex-col items-center gap-3">
                <div id="dateD" class="text-[9px] font-black text-indigo-600 bg-indigo-50 px-4 py-1.5 rounded-full uppercase tracking-widest">-- ---</div>
                <div class="flex items-center gap-3 w-full">
                    <input type="range" id="sld" min="0" max="365" value="0" class="flex-1">
                    <button id="resetBtn" class="text-[9px] font-black text-white bg-slate-900 px-4 py-2.5 rounded-xl uppercase hover:bg-slate-800 transition-all">Now</button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('cvs'), ctx = canvas.getContext('2d'), W = 800, H = 800, R = 340, R_MOON = 265;
        const latIn = document.getElementById('latIn'), lonIn = document.getElementById('lonIn'), sld = document.getElementById('sld');
        const dateD = document.getElementById('dateD'), riseT = document.getElementById('riseT'), setT = document.getElementById('setT'), tzLabel = document.getElementById('tzLabel');
        const dayL = document.getElementById('dayL'), nightL = document.getElementById('nightL'), mRise = document.getElementById('mRise'), mSet = document.getElementById('mSet'), mPhase = document.getElementById('mPhase');
        let manualOffset = parseInt(localStorage.getItem('lum_tz')) || -3;

        function saveLoc() {
            localStorage.setItem('lum_lat', latIn.value); localStorage.setItem('lum_lon', lonIn.value); localStorage.setItem('lum_tz', manualOffset);
            alert('Location & Timezone saved!');
        }

        function showTip(title, text, color) {
            const tip = document.getElementById('tip');
            document.getElementById('tipTitle').textContent = title; document.getElementById('tipBody').textContent = text;
            document.getElementById('tipColor').style.backgroundColor = color; tip.style.display = 'block';
            setTimeout(() => { tip.style.display = 'none'; }, 4000);
        }

        function adjTZ(v) { manualOffset += v; render(); }
        function getTargetDate(offsetHours) {
            const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * offsetHours));
        }

        function getMoonPhaseName(phase) {
            if (phase <= 0.03 || phase >= 0.97) return 'New Moon'; if (phase < 0.22) return 'Waxing Crescent';
            if (phase < 0.28) return 'First Quarter'; if (phase < 0.47) return 'Waxing Gibbous';
            if (phase < 0.53) return 'Full Moon'; if (phase < 0.72) return 'Waning Gibbous';
            if (phase < 0.78) return 'Last Quarter'; return 'Waning Crescent';
        }

        function fmt(d) {
            if (!d || isNaN(d.getTime())) return '--:--';
            let hr = d.getHours(), mn = d.getMinutes(); return `${hr % 12 || 12}:${String(mn).padStart(2, '0')}${hr >= 12 ? 'p' : 'a'}`;
        }

        function render() {
            ctx.clearRect(0, 0, W, H); const lat = parseFloat(latIn.value), lon = parseFloat(lonIn.value);
            tzLabel.textContent = `UTC${manualOffset >= 0 ? '+' : ''}${manualOffset}`;
            const targetNow = getTargetDate(manualOffset), viewDate = new Date(targetNow);
            viewDate.setDate(viewDate.getDate() + parseInt(sld.value));
            dateD.textContent = viewDate.toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase();
            
            const times = SunCalc.getTimes(viewDate, lat, lon), mTimes = SunCalc.getMoonTimes(viewDate, lat, lon), mIllum = SunCalc.getMoonIllumination(viewDate);
            riseT.textContent = fmt(times.sunrise); setT.textContent = fmt(times.sunset);
            mRise.textContent = mTimes.rise ? fmt(mTimes.rise) : '--:--'; mSet.textContent = mTimes.set ? fmt(mTimes.set) : '--:--';
            mPhase.textContent = getMoonPhaseName(mIllum.phase).toUpperCase();

            if (times.sunrise && times.sunset) {
                const dl = (times.sunset - times.sunrise) / 3600000;
                dayL.textContent = `${Math.floor(dl)}H ${Math.round((dl%1)*60)}M DAY`;
                nightL.textContent = `${Math.floor(24-dl)}H ${Math.round(((24-dl)%1)*60)}M NIGHT`;
            }

            const isNight = targetNow < times.sunrise || targetNow > times.sunset;
            canvas.style.backgroundColor = isNight ? '#0f172a' : '#ffffff';
            const textColor = isNight ? '#f8fafc' : '#1e293b';

            const getPos = (d) => {
                if (!d || isNaN(d.getTime())) return null;
                const h = d.getHours() + d.getMinutes()/60 + d.getSeconds()/3600;
                return (h/24)*2*Math.PI-Math.PI/2;
            };

            const drawArc = (s, e, c, rad, w=60) => {
                if (!s || !e) return; ctx.strokeStyle = c; ctx.lineWidth = w; ctx.beginPath();
                ctx.arc(400, 400, rad, getPos(s), getPos(e)); ctx.stroke();
            };

            drawArc(new Date(2026,0,1,0,0), new Date(2026,0,1,23,59), isNight ? '#1e293b' : '#f1f5f9', R); 
            drawArc(times.nightEnd, times.night, '#4f46e5', R); // Twilight ring
            drawArc(times.sunrise, times.sunset, '#fbbf24', R); 
            drawArc(times.sunrise, times.goldenHourEnd, '#f59e0b', R, 70); 
            drawArc(times.goldenHour, times.sunset, '#f59e0b', R, 70); 

            drawArc(new Date(2026,0,1,0,0), new Date(2026,0,1,23,59), isNight ? '#1e293b' : '#f1f5f9', R_MOON, 35); 
            if (mTimes.rise && mTimes.set) {
                if (mTimes.rise < mTimes.set) drawArc(mTimes.rise, mTimes.set, '#cbd5e1', R_MOON, 35);
                else { 
                    drawArc(mTimes.rise, new Date(viewDate).setHours(23,59), '#cbd5e1', R_MOON, 35);
                    drawArc(new Date(viewDate).setHours(0,0), mTimes.set, '#cbd5e1', R_MOON, 35);
                }
            }

            ctx.textAlign = 'center'; ctx.fillStyle = textColor; ctx.font = 'bold 20px Inter';
            for (let i = 0; i < 24; i += 3) {
                const a = (i/24)*2*Math.PI-Math.PI/2;
                ctx.fillText(i === 0 ? '24' : i, 400 + 375*Math.cos(a), 400 + 375*Math.sin(a));
            }

            const handAng = getPos(targetNow);
            ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 16; ctx.lineCap = 'round'; ctx.beginPath();
            ctx.moveTo(400, 400); ctx.lineTo(400 + (R+10)*Math.cos(handAng), 400 + (R+10)*Math.sin(handAng)); ctx.stroke();

            ctx.fillStyle = textColor; ctx.font = '900 120px Inter';
            ctx.fillText(`${String(targetNow.getHours()).padStart(2,'0')}:${String(targetNow.getMinutes()).padStart(2,'0')}`, 400, 440);
        }

        sld.oninput = render;
        document.getElementById('resetBtn').onclick = () => { sld.value = 0; render(); };
        window.onload = () => { 
            latIn.value = localStorage.getItem('lum_lat') || "45.2925";
            lonIn.value = localStorage.getItem('lum_lon') || "-66.1132";
            render(); setInterval(render, 1000); 
            setTimeout(() => { document.getElementById('splash').classList.add('fade-out'); document.getElementById('app').classList.add('ready'); }, 1800);
        };
    </script>
</body>
</html>
