<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SolarCycle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        html, body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; height: 100vh; width: 100%; overflow: hidden; }
        
        /* The container now centers the content vertically to remove gaps */
        .app-container { 
            display: flex; flex-direction: column; height: 100%; 
            padding: 0.5rem; padding-top: calc(0.2rem + var(--safe-top)); 
            box-sizing: border-box; max-width: 420px; margin: 0 auto;
            justify-content: flex-start; /* Aligns content to top, we'll use small margins to gap them */
        }

        .static-settings {
            background: white; border-radius: 1rem; padding: 0.6rem; 
            border: 1px solid #f1f5f9; margin-bottom: 0.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        /* Fixed: Reduced gaps by removing flex-1 and setting a tighter margin */
        .visualizer-area { 
            display: flex; align-items: center; justify-content: center; 
            width: 100%; margin-bottom: 0.5rem;
            max-height: 45vh; /* Prevents the clock from stretching the page */
        }
        
        canvas { 
            height: 100% !important; width: auto !important;
            aspect-ratio: 1 / 1; background-color: #ffffff; border-radius: 2rem; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04); 
        }

        .info-hub {
            background: white; padding: 0.85rem 1rem; border-radius: 1.75rem; 
            box-shadow: 0 -5px 30px rgba(0,0,0,0.06); border: 1px solid #f1f5f9;
            margin-bottom: calc(0.5rem + var(--safe-bottom));
        }

        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; height: 20px; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: #f1f5f9; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; 
            background: #4f46e5; margin-top: -9px; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="flex justify-between items-center px-2 mb-1">
            <h1 class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">SolarCycle</h1>
            <span id="timeModeDisplay" class="text-[9px] font-black text-indigo-500 uppercase">STD Time</span>
        </div>

        <div class="static-settings">
            <div class="flex gap-2 items-end">
                <div class="flex-1">
                    <label class="text-[7px] font-black text-slate-300 uppercase ml-1">Lat</label>
                    <input type="number" id="latitudeInput" value="45.27" class="w-full p-1.5 bg-slate-50 rounded-lg text-xs font-bold border border-slate-100 text-center">
                </div>
                <div class="flex-1">
                    <label class="text-[7px] font-black text-slate-300 uppercase ml-1">Lon</label>
                    <input type="number" id="longitudeInput" value="-66.06" class="w-full p-1.5 bg-slate-50 rounded-lg text-xs font-bold border border-slate-100 text-center">
                </div>
                <div class="flex-1">
                    <button id="toggleDstButton" class="w-full py-1.5 bg-slate-900 text-white rounded-lg text-[8px] font-black uppercase">DST: OFF</button>
                </div>
            </div>
        </div>

        <div class="visualizer-area">
            <canvas id="dayNightCanvas" width="600" height="600"></canvas>
        </div>

        <div class="info-hub">
            <div class="flex justify-between items-center mb-2 pb-2 border-b border-slate-50">
                <div class="text-left">
                    <span id="sunriseTime" class="text-xl font-black text-amber-500 tracking-tight">--:--</span>
                    <p id="dayLengthValue" class="text-[8px] font-extrabold text-slate-400 uppercase tracking-widest">-- DAY</p>
                </div>
                <div class="text-center bg-slate-100 px-2 py-0.5 rounded-full">
                    <span id="currentDateDisplay" class="text-[9px] font-black text-slate-600">--</span>
                </div>
                <div class="text-right">
                    <span id="sunsetTime" class="text-xl font-black text-indigo-600 tracking-tight">--:--</span>
                    <p id="nightLengthValue" class="text-[8px] font-extrabold text-slate-400 uppercase tracking-widest">-- NIGHT</p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <input type="range" id="daySlider" min="1" max="365" value="1" class="flex-1">
                <button id="resetToday" class="text-[9px] font-black text-white bg-indigo-600 px-3 py-2 rounded-xl shadow-md uppercase">Today</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const canvas = document.getElementById('dayNightCanvas'), ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height, centerX = W / 2, centerY = H / 2, CLOCK_RADIUS = H * 0.38;
            const daySlider = document.getElementById('daySlider'), currentDateDisplay = document.getElementById('currentDateDisplay');
            const sunriseTimeDisplay = document.getElementById('sunriseTime'), sunsetTimeDisplay = document.getElementById('sunsetTime'), dayLengthValue = document.getElementById('dayLengthValue'), nightLengthValue = document.getElementById('nightLengthValue');
            const latitudeInput = document.getElementById('latitudeInput'), longitudeInput = document.getElementById('longitudeInput'), toggleDstButton = document.getElementById('toggleDstButton'), timeModeDisplay = document.getElementById('timeModeDisplay'), resetToday = document.getElementById('resetToday');

            const now = new Date(), YEAR = now.getFullYear();
            const start = new Date(YEAR, 0, 0), todayOrdinal = Math.floor((now - start) / (1000 * 60 * 60 * 24));
            let currentDay = todayOrdinal, isDst = false;

            resetToday.onclick = () => { daySlider.value = todayOrdinal; update(); };

            function getSunTimes(day, lat, lon, isDst) {
                const utcDate = new Date(Date.UTC(YEAR, 0, day, 12));
                const times = SunCalc.getTimes(utcDate, lat, lon), offset = -4 + (isDst ? 1 : 0);
                const toWall = (date) => (date && !isNaN(date.getTime())) ? (new Date(date.getTime() + (offset * 3600000)).getUTCHours() + new Date(date.getTime() + (offset * 3600000)).getUTCMinutes() / 60) : null;
                const sunrise = toWall(times.sunrise) || toWall(times.dawn), sunset = toWall(times.sunset) || toWall(times.dusk);
                return { sunrise, sunset, dayLen: (sunset - sunrise + 24) % 24, nightLen: 24 - ((sunset - sunrise + 24) % 24) };
            }

            function drawClock() {
                ctx.clearRect(0, 0, W, H);
                const times = getSunTimes(currentDay, parseFloat(latitudeInput.value), parseFloat(longitudeInput.value), isDst);
                const d = new Date(), nowH = (d.getUTCHours() + d.getUTCMinutes() / 60 - 4 + (isDst ? 1 : 0) + 24) % 24;
                
                const drawArc = (s, e, color) => { ctx.strokeStyle = color; ctx.lineWidth = 85; ctx.beginPath(); ctx.arc(centerX, centerY, CLOCK_RADIUS, (s / 24 * 2 * Math.PI) - Math.PI / 2, (e / 24 * 2 * Math.PI) - Math.PI / 2); ctx.stroke(); };
                drawArc(times.sunset, times.sunrise, '#0f172a'); drawArc(times.sunrise, times.sunset, '#fbbf24');

                const timeToPolar = (h, r) => ({ x: centerX + r * Math.cos((h / 24) * 2 * Math.PI - Math.PI / 2), y: centerY + r * Math.sin((h / 24) * 2 * Math.PI - Math.PI / 2) });
                const handP = timeToPolar(nowH, CLOCK_RADIUS - 20);
                ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 14; ctx.lineCap = 'round'; ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.lineTo(handP.x, handP.y); ctx.stroke();
                
                ctx.fillStyle = '#1e293b'; ctx.font = '900 74px Inter'; ctx.textAlign = 'center';
                const hDisp = Math.floor(nowH), mDisp = Math.floor((nowH % 1) * 60);
                ctx.fillText(`${hDisp % 12 || 12}:${String(mDisp).padStart(2, '0')}`, centerX, centerY - 10);
                
                ctx.font = '900 32px Inter';
                if (nowH >= times.sunrise && nowH < times.sunset) {
                    const r = times.sunset - nowH, rH = Math.floor(r), rM = Math.floor((r % 1) * 60);
                    ctx.fillStyle = '#f59e0b'; ctx.fillText(`${rH}H ${rM}M LEFT`, centerX, centerY + 65);
                } else {
                    ctx.fillStyle = '#6366f1'; ctx.fillText("NIGHT", centerX, centerY + 65);
                }
                
                const toClock = (h) => `${Math.floor(h) % 12 || 12}:${String(Math.round((h % 1) * 60)).padStart(2, '0')} ${h >= 12 ? 'PM' : 'AM'}`;
                sunriseTimeDisplay.textContent = toClock(times.sunrise); 
                sunsetTimeDisplay.textContent = toClock(times.sunset);
                dayLengthValue.textContent = `${Math.floor(times.dayLen)}h ${Math.round((times.dayLen % 1) * 60)}m DAY`;
                nightLengthValue.textContent = `${Math.floor(times.nightLen)}h ${Math.round((times.nightLen % 1) * 60)}m NIGHT`;
            }

            const update = () => {
                currentDay = parseInt(daySlider.value);
                currentDateDisplay.textContent = new Date(YEAR, 0, currentDay).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase();
                toggleDstButton.textContent = `DST: ${isDst ? 'ON' : 'OFF'}`;
                timeModeDisplay.textContent = isDst ? 'DST Time' : 'STD Time';
                drawClock();
            };

            toggleDstButton.onclick = () => { isDst = !isDst; update(); };
            [daySlider, latitudeInput, longitudeInput].forEach(e => e.oninput = update);
            window.onload = () => { daySlider.value = todayOrdinal; update(); setInterval(drawClock, 30000); };
        })();
    </script>
</body>
</html>
