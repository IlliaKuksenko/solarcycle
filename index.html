<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SolarCycle Favorites</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        html, body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100%; padding: 0.5rem; padding-top: calc(0.2rem + var(--safe-top)); box-sizing: border-box; max-width: 420px; margin: 0 auto; }
        .static-settings { background: white; border-radius: 1rem; padding: 0.6rem; border: 1px solid #f1f5f9; margin-bottom: 0.5rem; }
        .visualizer-area { display: flex; align-items: center; justify-content: center; width: 100%; flex: 1; min-height: 0; }
        canvas { max-height: 100%; width: auto !important; aspect-ratio: 1 / 1; background-color: #ffffff; border-radius: 2rem; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04); }
        .info-hub { background: white; padding: 0.85rem 1rem; border-radius: 1.75rem; box-shadow: 0 -5px 30px rgba(0,0,0,0.06); border: 1px solid #f1f5f9; margin-bottom: calc(0.5rem + var(--safe-bottom)); }
        .fav-btn { font-size: 8px; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; transition: all 0.2s; border: 1px solid #e2e8f0; }
        .fav-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; height: 20px; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: #e2e8f0; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #4f46e5; margin-top: -9px; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="flex justify-between items-center px-2 mb-2">
            <h1 class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">SolarCycle</h1>
            <div class="flex gap-1">
                <button onclick="setLoc(45.27, -66.06, this)" class="fav-btn active">Saint John</button>
                <button onclick="setLoc(50.45, 30.52, this)" class="fav-btn">Kyiv</button>
            </div>
        </header>

        <section class="static-settings">
            <div class="flex gap-2 items-end">
                <div class="flex-1">
                    <label class="text-[7px] font-black text-slate-300 uppercase ml-1">Lat</label>
                    <input type="number" id="latitudeInput" value="45.27" step="0.01" class="w-full p-1.5 bg-slate-50 rounded-lg text-xs font-bold border border-slate-100 text-center">
                </div>
                <div class="flex-1">
                    <label class="text-[7px] font-black text-slate-300 uppercase ml-1">Lon</label>
                    <input type="number" id="longitudeInput" value="-66.06" step="0.01" class="w-full p-1.5 bg-slate-50 rounded-lg text-xs font-bold border border-slate-100 text-center">
                </div>
                <div class="flex-1">
                    <button id="resetToday" class="w-full py-1.5 bg-slate-900 text-white rounded-lg text-[8px] font-black uppercase active:scale-95">Today</button>
                </div>
            </div>
        </section>

        <main class="visualizer-area">
            <canvas id="dayNightCanvas" width="600" height="600"></canvas>
        </main>

        <footer class="info-hub">
            <div class="flex justify-between items-center mb-2 pb-2 border-b border-slate-50">
                <div class="text-left">
                    <time id="sunriseTime" class="text-lg font-black text-amber-500">--:--</time>
                    <p id="dayLengthValue" class="text-[7px] font-bold text-slate-400 uppercase">-- DAY</p>
                </div>
                <div class="text-center bg-slate-100 px-2 py-0.5 rounded-full">
                    <span id="currentDateDisplay" class="text-[9px] font-black text-slate-600">--</span>
                </div>
                <div class="text-right">
                    <time id="sunsetTime" class="text-lg font-black text-indigo-600">--:--</time>
                    <p id="nightLengthValue" class="text-[7px] font-bold text-slate-400 uppercase">-- NIGHT</p>
                </div>
            </div>
            <div class="flex justify-between items-center mb-3">
                <div class="text-left"><p class="text-[6px] font-black text-slate-300 uppercase">Moonrise</p><time id="moonriseTime" class="text-xs font-bold text-slate-500">--:--</time></div>
                <div id="moonPhaseLabel" class="text-[8px] font-black text-slate-400 uppercase tracking-tighter">--</div>
                <div class="text-right"><p class="text-[6px] font-black text-slate-300 uppercase">Moonset</p><time id="moonsetTime" class="text-xs font-bold text-slate-500">--:--</time></div>
            </div>
            <div class="flex items-center gap-3">
                <input type="range" id="daySlider" min="1" max="365" value="1" class="flex-1">
                <div class="text-[9px] font-black text-indigo-600 uppercase">Live</div>
            </div>
        </footer>
    </div>

    <script>
        const latitudeInput = document.getElementById('latitudeInput'), longitudeInput = document.getElementById('longitudeInput');
        
        window.setLoc = (lat, lon, btn) => {
            latitudeInput.value = lat;
            longitudeInput.value = lon;
            document.querySelectorAll('.fav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            window.requestUpdate();
        };

        (function () {
            const COLORS = { day: '#fbbf24', twilight: '#4f46e5', night: '#0f172a', hand: '#ef4444', textMain: '#1e293b', textSec: '#94a3b8' };
            const canvas = document.getElementById('dayNightCanvas'), ctx = canvas.getContext('2d'), W = canvas.width, H = canvas.height, centerX = W / 2, centerY = H / 2, CLOCK_RADIUS = H * 0.38;
            const daySlider = document.getElementById('daySlider'), currentDateDisplay = document.getElementById('currentDateDisplay');
            const sunriseTimeDisplay = document.getElementById('sunriseTime'), sunsetTimeDisplay = document.getElementById('sunsetTime'), dayLengthValue = document.getElementById('dayLengthValue'), nightLengthValue = document.getElementById('nightLengthValue');
            const moonriseDisplay = document.getElementById('moonriseTime'), moonsetDisplay = document.getElementById('moonsetTime');

            const YEAR = new Date().getFullYear();
            const start = new Date(YEAR, 0, 0), todayOrdinal = Math.floor((new Date() - start) / (1000 * 60 * 60 * 24));

            const toSolarDecimal = (date, lon) => {
                if (!date || isNaN(date.getTime())) return null;
                const utcHours = date.getUTCHours() + date.getUTCMinutes() / 60 + date.getUTCSeconds() / 3600;
                return (utcHours + (lon / 15) + 24) % 24;
            };

            const formatTime = (h) => (h === null || isNaN(h)) ? '--:--' : `${Math.floor(h) % 12 || 12}:${String(Math.floor((h % 1) * 60)).padStart(2, '0')} ${h >= 12 ? 'PM' : 'AM'}`;

            function render() {
                ctx.clearRect(0, 0, W, H);
                const currentDay = parseInt(daySlider.value), lat = parseFloat(latitudeInput.value), lon = parseFloat(longitudeInput.value);
                const date = new Date(Date.UTC(YEAR, 0, currentDay, 12));
                currentDateDisplay.textContent = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase();
                
                const sTimes = SunCalc.getTimes(date, lat, lon);
                const sun = { dawn: toSolarDecimal(sTimes.dawn, lon), sunrise: toSolarDecimal(sTimes.sunrise, lon), sunset: toSolarDecimal(sTimes.sunset, lon), night: toSolarDecimal(sTimes.night, lon) };
                const mTimes = SunCalc.getMoonTimes(date, lat, lon);

                sunriseTimeDisplay.textContent = formatTime(sun.sunrise);
                sunsetTimeDisplay.textContent = formatTime(sun.sunset);
                moonriseDisplay.textContent = formatTime(toSolarDecimal(mTimes.rise, lon));
                moonsetDisplay.textContent = formatTime(toSolarDecimal(mTimes.set, lon));

                if (sun.sunrise !== null) {
                    const dL = (sun.sunset - sun.sunrise + 24) % 24;
                    dayLengthValue.textContent = `${Math.floor(dL)}h ${Math.round((dL % 1) * 60)}m DAY`;
                    nightLengthValue.textContent = `${Math.floor(24-dL)}h ${Math.round(((24-dL) % 1) * 60)}m NIGHT`;
                }

                const now = new Date(), nowSolarH = (now.getUTCHours() + now.getUTCMinutes() / 60 + (lon / 15) + 24) % 24;
                const drawArc = (s, e, color) => {
                    if (s === null || e === null) return;
                    ctx.strokeStyle = color; ctx.lineWidth = 85; ctx.beginPath();
                    ctx.arc(centerX, centerY, CLOCK_RADIUS, (s / 24 * 2 * Math.PI) - Math.PI / 2, (e / 24 * 2 * Math.PI) - Math.PI / 2);
                    ctx.stroke();
                };

                drawArc(0, 24, COLORS.night);
                if (sun.sunrise !== null) { drawArc(sun.dawn, sun.sunrise, COLORS.twilight); drawArc(sun.sunset, sun.night, COLORS.twilight); drawArc(sun.sunrise, sun.sunset, COLORS.day); }

                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                for (let i = 0; i < 24; i += 3) {
                    const angle = (i / 24) * 2 * Math.PI - Math.PI / 2, x = centerX + (CLOCK_RADIUS + 65) * Math.cos(angle), y = centerY + (CLOCK_RADIUS + 65) * Math.sin(angle);
                    ctx.font = 'bold 14px Inter'; ctx.fillStyle = COLORS.textMain; ctx.fillText(i === 0 ? '24' : i, x, y);
                }

                const handP = { x: centerX + (CLOCK_RADIUS - 20) * Math.cos((nowSolarH / 24) * 2 * Math.PI - Math.PI / 2), y: centerY + (CLOCK_RADIUS - 20) * Math.sin((nowSolarH / 24) * 2 * Math.PI - Math.PI / 2) };
                ctx.strokeStyle = COLORS.hand; ctx.lineWidth = 14; ctx.lineCap = 'round'; ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.lineTo(handP.x, handP.y); ctx.stroke();
                
                ctx.fillStyle = COLORS.textMain; ctx.font = '900 74px Inter';
                ctx.fillText(`${Math.floor(nowSolarH) % 12 || 12}:${String(Math.floor((nowSolarH % 1) * 60)).padStart(2, '0')}`, centerX, centerY - 10);
            }

            let ticking = false;
            window.requestUpdate = () => { if(!ticking) { requestAnimationFrame(() => { render(); ticking = false; }); ticking = true; } };

            [daySlider, latitudeInput, longitudeInput].forEach(e => e.oninput = window.requestUpdate);
            document.getElementById('resetToday').onclick = () => { daySlider.value = todayOrdinal; window.requestUpdate(); };
            window.onload = () => { daySlider.value = todayOrdinal; window.requestUpdate(); setInterval(window.requestUpdate, 30000); };
        })();
    </script>
</body>
</html>
