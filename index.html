<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luminaries Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        html, body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; height: 100dvh; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100%; padding: 0.4rem; padding-top: calc(0.2rem + var(--safe-top)); box-sizing: border-box; max-width: 480px; margin: 0 auto; }
        
        .visualizer-area { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; position: relative; cursor: pointer; }
        canvas { height: 100%; width: 100%; object-fit: contain; background: #0f172a; border-radius: 1.5rem; transition: background-color 0.5s ease; }
        
        .info-hub { background: white; padding: 1rem; border-radius: 1.5rem; border: 1px solid #f1f5f9; flex-shrink: 0; margin-bottom: var(--safe-bottom); }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: #e2e8f0; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #4f46e5; border: 3px solid white; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3); }

        #phaseInfo { pointer-events: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; transform: scale(0.95); z-index: 50; }
        #phaseInfo.active { opacity: 1; transform: scale(1); }
        
        .legend-dot { width: 8px; height: 8px; border-radius: 99px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="flex justify-between items-center px-2 mb-2">
            <h1 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Luminaries Pro</h1>
            <div class="bg-slate-100 px-3 py-1 rounded-lg text-[10px] font-bold text-slate-600">45.2925, -66.1132</div>
        </header>

        <main class="visualizer-area">
            <canvas id="cvs" width="800" height="800"></canvas>
            
            <div id="phaseInfo" class="absolute inset-0 flex flex-col items-center justify-center">
                <div class="bg-white/95 backdrop-blur-xl px-8 py-5 rounded-[2.5rem] border border-white shadow-2xl text-center">
                    <span id="pLabel" class="text-[10px] font-black text-indigo-600 uppercase tracking-widest block mb-1">Twilight</span>
                    <div id="pRange" class="text-3xl font-black text-slate-900 tabular-nums">--:--</div>
                </div>
            </div>
        </main>

        <div class="flex justify-center gap-4 mb-3">
            <div class="flex items-center gap-1.5"><div class="legend-dot bg-[#fbbf24]"></div><span class="text-[8px] font-black text-slate-400 uppercase">Day</span></div>
            <div class="flex items-center gap-1.5"><div class="legend-dot bg-[#f59e0b]"></div><span class="text-[8px] font-black text-slate-400 uppercase">Golden</span></div>
            <div class="flex items-center gap-1.5"><div class="legend-dot bg-[#4f46e5]"></div><span class="text-[8px] font-black text-slate-400 uppercase">Twilight</span></div>
            <div class="flex items-center gap-1.5"><div class="legend-dot bg-[#1e293b]"></div><span class="text-[8px] font-black text-slate-400 uppercase">Night</span></div>
        </div>

        <footer class="info-hub">
            <div class="flex gap-3 mb-5">
                <div class="flex-1 bg-amber-50/50 rounded-2xl p-3 border border-amber-100 flex flex-col justify-between">
                    <div class="flex justify-between mb-3">
                        <div class="flex flex-col"><span class="text-[8px] font-black text-amber-600 uppercase">Sunrise</span><time id="riseT" class="text-lg font-black text-slate-900">--:--</time></div>
                        <div class="flex flex-col items-end"><span class="text-[8px] font-black text-amber-600 uppercase">Sunset</span><time id="setT" class="text-lg font-black text-slate-900">--:--</time></div>
                    </div>
                    <div class="space-y-1">
                        <div id="dayL" class="text-center text-[9px] font-black text-amber-700 bg-white/80 py-1 rounded-md uppercase">--H --M DAY</div>
                        <div id="nightL" class="text-center text-[9px] font-black text-slate-400 bg-slate-50 py-1 rounded-md uppercase">--H --M NIGHT</div>
                    </div>
                </div>

                <div class="flex-1 bg-indigo-50/50 rounded-2xl p-3 border border-indigo-100 flex flex-col justify-between">
                    <div class="flex justify-between mb-3">
                        <div class="flex flex-col"><span class="text-[8px] font-black text-indigo-600 uppercase">Moonrise</span><time id="mRise" class="text-lg font-black text-slate-900">--:--</time></div>
                        <div class="flex flex-col items-end"><span class="text-[8px] font-black text-indigo-600 uppercase">Moonset</span><time id="mSet" class="text-lg font-black text-slate-900">--:--</time></div>
                    </div>
                    <div id="mPhase" class="text-center text-[9px] font-black text-indigo-700 bg-white/80 py-2 rounded-md uppercase">PHASE</div>
                </div>
            </div>

            <div class="flex flex-col items-center">
                <div id="dateD" class="text-[10px] font-black text-indigo-600 uppercase bg-indigo-50 px-5 py-1.5 rounded-full mb-3 tracking-widest border border-indigo-100">MAR 23</div>
                <div class="flex items-center gap-4 w-full">
                    <input type="range" id="sld" min="0" max="365" value="0" class="flex-1">
                    <button id="resetBtn" class="bg-slate-900 text-white text-[11px] font-black px-5 py-2.5 rounded-xl uppercase active:scale-95 transition-transform">Now</button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('cvs'), ctx = canvas.getContext('2d'), W = 800, H = 800, R = 340, R_MOON = 265;
        const sld = document.getElementById('sld'), dateD = document.getElementById('dateD');
        const riseT = document.getElementById('riseT'), setT = document.getElementById('setT'), dayL = document.getElementById('dayL'), nightL = document.getElementById('nightL');
        const mRise = document.getElementById('mRise'), mSet = document.getElementById('mSet'), mPhase = document.getElementById('mPhase');
        const pInfo = document.getElementById('phaseInfo'), pLabel = document.getElementById('pLabel'), pRange = document.getElementById('pRange');

        let currentSun = null, currentMoon = null;

        function fmt(d) {
            if (!d || isNaN(d.getTime())) return '--:--';
            let hr = d.getHours(), mn = d.getMinutes();
            return `${hr % 12 || 12}:${String(mn).padStart(2, '0')} ${hr >= 12 ? 'PM' : 'AM'}`;
        }

        const getPos = (d) => {
            const h = d.getHours() + d.getMinutes()/60 + d.getSeconds()/3600;
            return (h/24)*2*Math.PI-Math.PI/2;
        };

        function render() {
            ctx.clearRect(0, 0, W, H);
            const lat = 45.2925, lon = -66.1132;
            const targetNow = new Date();
            const viewDate = new Date(targetNow);
            viewDate.setDate(viewDate.getDate() + parseInt(sld.value));

            dateD.textContent = viewDate.toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase();
            
            currentSun = SunCalc.getTimes(viewDate, lat, lon);
            currentMoon = SunCalc.getMoonTimes(viewDate, lat, lon);
            const mIllum = SunCalc.getMoonIllumination(viewDate);

            // UI Data Update
            riseT.textContent = fmt(currentSun.sunrise).split(' ')[0];
            setT.textContent = fmt(currentSun.sunset).split(' ')[0];
            mRise.textContent = currentMoon.rise ? fmt(currentMoon.rise).split(' ')[0] : '---';
            mSet.textContent = currentMoon.set ? fmt(currentMoon.set).split(' ')[0] : '---';
            
            const dayLen = (currentSun.sunset - currentSun.sunrise) / 3600000;
            dayL.textContent = `${Math.floor(dayLen)}H ${Math.round((dayLen%1)*60)}M DAY`;
            nightL.textContent = `${Math.floor(24-dayLen)}H ${Math.round(((24-dayLen)%1)*60)}M NIGHT`;
            
            const phases = ["New Moon", "Waxing Crescent", "First Quarter", "Waxing Gibbous", "Full Moon", "Waning Gibbous", "Last Quarter", "Waning Crescent"];
            mPhase.textContent = phases[Math.floor(mIllum.phase * 8) % 8];

            // 1. Draw 24-Hour Markers
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            for (let i = 0; i < 24; i++) {
                const ang = (i/24)*2*Math.PI - Math.PI/2;
                const isMajor = i % 6 === 0;
                ctx.fillStyle = isMajor ? '#f8fafc' : '#334155';
                ctx.font = isMajor ? '900 24px Inter' : '600 12px Inter';
                if (isMajor) ctx.fillText(i === 0 ? '24' : i, 400 + 380 * Math.cos(ang), 400 + 380 * Math.sin(ang));
                else {
                    ctx.beginPath(); ctx.arc(400 + 375 * Math.cos(ang), 400 + 375 * Math.sin(ang), 2, 0, Math.PI*2); ctx.fill();
                }
            }

            const drawArc = (s, e, c, rad, w=60) => {
                if(!s || !e) return;
                ctx.strokeStyle = c; ctx.lineWidth = w; ctx.lineCap = 'butt';
                ctx.beginPath(); ctx.arc(400, 400, rad, getPos(s), getPos(e)); ctx.stroke();
            };

            // 2. Solar Rings
            drawArc(new Date(viewDate).setHours(0,0), new Date(viewDate).setHours(23,59), '#1e293b', R);
            drawArc(currentSun.dawn, currentSun.dusk, '#4f46e5', R);
            drawArc(currentSun.sunrise, currentSun.sunset, '#fbbf24', R);
            drawArc(currentSun.sunrise, currentSun.goldenHourEnd, '#f59e0b', R, 85);
            drawArc(currentSun.goldenHour, currentSun.sunset, '#f59e0b', R, 85);

            // 3. Moon Ring
            drawArc(new Date(viewDate).setHours(0,0), new Date(viewDate).setHours(23,59), '#1e293b', R_MOON, 35);
            if (currentMoon.rise && currentMoon.set) {
                if (currentMoon.rise < currentMoon.set) drawArc(currentMoon.rise, currentMoon.set, '#cbd5e1', R_MOON, 35);
                else {
                    drawArc(currentMoon.rise, new Date(viewDate).setHours(23,59,59), '#cbd5e1', R_MOON, 35);
                    drawArc(new Date(viewDate).setHours(0,0,0), currentMoon.set, '#cbd5e1', R_MOON, 35);
                }
            }

            // 4. Time Hand & Central Clock
            const hAng = getPos(targetNow);
            ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 12; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(400, 400); ctx.lineTo(400 + 355 * Math.cos(hAng), 400 + 355 * Math.sin(hAng)); ctx.stroke();

            ctx.fillStyle = '#f8fafc'; ctx.font = '900 130px Inter';
            ctx.fillText(`${String(targetNow.getHours()).padStart(2,'0')}:${String(targetNow.getMinutes()).padStart(2,'0')}`, 400, 440);
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (800 / rect.width) - 400;
            const y = (e.clientY - rect.top) * (800 / rect.height) - 400;
            const dist = Math.sqrt(x*x + y*y);
            const angle = Math.atan2(y, x) + Math.PI/2;
            const norm = angle < 0 ? angle + 2*Math.PI : angle;

            const check = (s, e) => {
                const start = getPos(s) + Math.PI/2, end = getPos(e) + Math.PI/2;
                return start < end ? (norm >= start && norm <= end) : (norm >= start || norm <= end);
            };

            if (dist > 280 && dist < 390) {
                if (check(currentSun.goldenHour, currentSun.sunset) || check(currentSun.sunrise, currentSun.goldenHourEnd)) showPop("Golden Hour", `${fmt(currentSun.sunrise)} - ${fmt(currentSun.goldenHourEnd)}`);
                else if (check(currentSun.sunrise, currentSun.sunset)) showPop("Daylight", `${fmt(currentSun.sunrise)} - ${fmt(currentSun.sunset)}`);
                else if (check(currentSun.dawn, currentSun.dusk)) showPop("Twilight", `${fmt(currentSun.dawn)} - ${fmt(currentSun.dusk)}`);
                else showPop("Night", `${fmt(currentSun.sunset)} - ${fmt(currentSun.sunrise)}`);
            }
        });

        function showPop(l, r) {
            pLabel.textContent = l; pRange.textContent = r;
            pInfo.classList.add('active');
            setTimeout(() => pInfo.classList.remove('active'), 3000);
        }

        sld.oninput = render;
        document.getElementById('resetBtn').onclick = () => { sld.value = 0; render(); };
        window.onload = () => { render(); setInterval(render, 1000); };
    </script>
</body>
</html>
