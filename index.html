<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SolarCycle Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        html, body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; height: 100dvh; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100%; padding: 0.5rem; padding-top: calc(0.5rem + var(--safe-top)); box-sizing: border-box; max-width: 420px; margin: 0 auto; }
        .settings-panel { background: white; border-radius: 1.25rem; padding: 0.75rem; border: 1px solid #f1f5f9; margin-bottom: 0.5rem; flex-shrink: 0; }
        .visualizer-area { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0.25rem 0; }
        canvas { max-height: 100%; max-width: 100%; aspect-ratio: 1/1; background: white; border-radius: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .info-hub { background: white; padding: 1rem; border-radius: 1.75rem; box-shadow: 0 -5px 30px rgba(0,0,0,0.06); border: 1px solid #f1f5f9; flex-shrink: 0; margin-bottom: var(--safe-bottom); }
        .fav-btn { font-size: 9px; font-weight: 800; padding: 6px 12px; border-radius: 8px; text-transform: uppercase; border: 1px solid #e2e8f0; background: #f8fafc; color: #64748b; }
        .fav-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: #e2e8f0; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #4f46e5; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="flex justify-between items-center px-2 mb-2 flex-shrink-0">
            <h1 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">SolarCycle</h1>
            <div class="flex gap-1.5" id="tabs">
                <button onclick="useCurrentLoc(this)" id="btnCurrent" class="fav-btn active">Current Location</button>
                <button onclick="loadSavedLoc(this)" id="btnSaved" class="fav-btn">Favorite</button>
            </div>
        </header>

        <section class="settings-panel">
            <div class="flex gap-2 items-end">
                <div class="flex-1">
                    <label class="text-[8px] font-black text-slate-400 block mb-1 uppercase">Lat</label>
                    <input type="number" id="latIn" value="45.27" step="0.0001" class="w-full p-2 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100 text-center">
                </div>
                <div class="flex-1">
                    <label class="text-[8px] font-black text-slate-400 block mb-1 uppercase">Lon</label>
                    <input type="number" id="lonIn" value="-66.06" step="0.0001" class="w-full p-2 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100 text-center">
                </div>
                <button onclick="saveToFavorite()" class="h-[34px] px-3 bg-indigo-50 text-indigo-600 rounded-xl text-[16px] active:scale-90 transition-transform">★</button>
                <button id="resetBtn" class="h-[34px] px-3 bg-slate-900 text-white rounded-xl text-[9px] font-black uppercase">Sync</button>
            </div>
        </section>

        <main class="visualizer-area"><canvas id="cvs" width="600" height="600"></canvas></main>

        <footer class="info-hub">
            <div class="flex justify-between items-center mb-4 pb-4 border-b border-slate-50">
                <div class="text-left">
                    <p class="text-[9px] font-black text-amber-500 uppercase mb-1">☼ Sunrise</p>
                    <time id="riseT" class="text-3xl font-black text-slate-900 tracking-tight">--:--</time>
                    <p id="dayL" class="text-[8px] font-bold text-slate-400 mt-1 uppercase">-- Day</p>
                </div>
                <div class="bg-slate-100 px-3 py-1 rounded-full"><span id="dateD" class="text-[10px] font-black text-slate-600">--</span></div>
                <div class="text-right">
                    <p class="text-[9px] font-black text-indigo-500 uppercase mb-1">Sunset ☼</p>
                    <time id="setT" class="text-3xl font-black text-slate-900 tracking-tight">--:--</time>
                    <p id="nightL" class="text-[8px] font-bold text-slate-400 mt-1 uppercase">-- Night</p>
                </div>
            </div>
            <div class="flex justify-between items-center mb-4 px-1">
                <div class="text-left"><p class="text-[8px] font-black text-slate-300 uppercase">☾ Moonrise</p><time id="mRise" class="text-sm font-bold text-slate-500">--:--</time></div>
                <div class="text-right"><p class="text-[8px] font-black text-slate-300 uppercase">Moonset ☾</p><time id="mSet" class="text-sm font-bold text-slate-500">--:--</time></div>
            </div>
            <div class="flex items-center gap-3"><input type="range" id="sld" min="1" max="365" value="1" class="flex-1"><div class="text-[10px] font-black text-indigo-600 uppercase">Live</div></div>
        </footer>
    </div>

    <script>
        const latIn = document.getElementById('latIn'), lonIn = document.getElementById('lonIn'), btnSaved = document.getElementById('btnSaved');
        
        function saveToFavorite() {
            const name = prompt("Name this favorite:", btnSaved.innerText === "FAVORITE" ? "" : btnSaved.innerText);
            if (name) {
                const data = { name: name.toUpperCase(), lat: latIn.value, lon: lonIn.value };
                localStorage.setItem('solarFav', JSON.stringify(data));
                updateFavUI();
            }
        }

        function updateFavUI() {
            const saved = JSON.parse(localStorage.getItem('solarFav'));
            if (saved) { btnSaved.innerText = saved.name; }
        }

        function loadSavedLoc(btn) {
            const saved = JSON.parse(localStorage.getItem('solarFav'));
            if (saved) {
                latIn.value = saved.lat; lonIn.value = saved.lon;
                setActive(btn);
            } else { saveToFavorite(); }
        }

        function useCurrentLoc(btn) {
            navigator.geolocation.getCurrentPosition(p => {
                latIn.value = p.coords.latitude.toFixed(4);
                lonIn.value = p.coords.longitude.toFixed(4);
                setActive(btn);
            });
        }

        function setActive(btn) {
            document.querySelectorAll('.fav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            window.requestUpdate();
        }

        (function () {
            const canvas = document.getElementById('cvs'), ctx = canvas.getContext('2d'), W = 600, H = 600, R = 220;
            const sld = document.getElementById('sld'), dateD = document.getElementById('dateD'), riseT = document.getElementById('riseT'), setT = document.getElementById('setT');
            const dayL = document.getElementById('dayL'), nightL = document.getElementById('nightL'), mRise = document.getElementById('mRise'), mSet = document.getElementById('mSet');

            // Crucial Fix: Standardize all time display to the coordinate's offset
            const toDec = (d, lon) => {
                if (!d) return null;
                const utc = d.getUTCHours() + d.getUTCMinutes()/60 + d.getUTCSeconds()/3600;
                const offset = lon / 15;
                return (utc + offset + 24) % 24;
            };

            const fmt = (h) => {
                if (h === null || isNaN(h)) return '--:--';
                const hours = Math.floor(h) % 24;
                const displayH = hours % 12 || 12;
                const m = String(Math.floor((h % 1) * 60)).padStart(2, '0');
                return `${displayH}:${m} ${hours >= 12 ? 'PM' : 'AM'}`;
            };

            function render() {
                ctx.clearRect(0, 0, W, H);
                const day = parseInt(sld.value), lat = parseFloat(latIn.value), lon = parseFloat(lonIn.value);
                const date = new Date(Date.UTC(2026, 0, day, 12));
                dateD.textContent = date.toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase();
                
                const s = SunCalc.getTimes(date, lat, lon), m = SunCalc.getMoonTimes(date, lat, lon);
                const sun = { dawn: toDec(s.dawn, lon), rise: toDec(s.sunrise, lon), set: toDec(s.sunset, lon), night: toDec(s.night, lon) };
                
                riseT.textContent = fmt(sun.rise); setT.textContent = fmt(sun.set);
                mRise.textContent = fmt(toDec(m.rise, lon)); mSet.textContent = fmt(toDec(m.set, lon));

                if (sun.rise !== null) {
                    const dl = (sun.set - sun.rise + 24) % 24;
                    dayL.textContent = `${Math.floor(dl)}H ${Math.round((dl%1)*60)}M DAY`;
                    nightL.textContent = `${Math.floor(24-dl)}H ${Math.round(((24-dl)%1)*60)}M NIGHT`;
                }

                const now = new Date();
                const nowH = toDec(now, lon);
                
                const arc = (sStart, sEnd, color) => {
                    if (sStart === null || sEnd === null) return;
                    ctx.strokeStyle = color; ctx.lineWidth = 80; ctx.beginPath();
                    ctx.arc(300, 300, R, (sStart/24)*2*Math.PI-Math.PI/2, (sEnd/24)*2*Math.PI-Math.PI/2);
                    ctx.stroke();
                };

                arc(0, 24, '#0f172a');
                if (sun.rise !== null) { 
                    arc(sun.dawn, sun.rise, '#4f46e5'); 
                    arc(sun.set, sun.night, '#4f46e5'); 
                    arc(sun.rise, sun.set, '#fbbf24'); 
                }

                ctx.textAlign = 'center'; ctx.fillStyle = '#1e293b'; ctx.font = 'bold 14px Inter';
                for (let i = 0; i < 24; i += 3) {
                    const a = (i/24)*2*Math.PI-Math.PI/2;
                    ctx.fillText(i === 0 ? '24' : i, 300 + 285*Math.cos(a), 300 + 285*Math.sin(a));
                }

                ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.beginPath();
                ctx.moveTo(300, 300);
                ctx.lineTo(300 + 200*Math.cos((nowH/24)*2*Math.PI-Math.PI/2), 300 + 200*Math.sin((nowH/24)*2*Math.PI-Math.PI/2));
                ctx.stroke();
                
                ctx.fillStyle = '#1e293b'; ctx.font = '900 80px Inter';
                const hh = Math.floor(nowH), mm = String(Math.floor((nowH % 1) * 60)).padStart(2, '0');
                ctx.fillText(`${hh}:${mm}`, 300, 310);
            }

            let tick = false;
            window.requestUpdate = () => { if(!tick) { requestAnimationFrame(() => { render(); tick = false; }); tick = true; } };
            [sld, latIn, lonIn].forEach(e => e.oninput = window.requestUpdate);
            document.getElementById('resetBtn').onclick = () => { 
                const start = new Date(Date.UTC(2026, 0, 0));
                sld.value = Math.floor((new Date() - start) / 86400000); 
                window.requestUpdate(); 
            };
            window.onload = () => { 
                updateFavUI(); 
                const start = new Date(Date.UTC(2026, 0, 0));
                sld.value = Math.floor((new Date() - start) / 86400000); 
                window.requestUpdate(); 
                setInterval(window.requestUpdate, 1000);
            };
        })();
    </script>
</body>
</html>
