<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SolarCycle Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        html, body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; height: 100dvh; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100%; padding: 0.5rem; padding-top: calc(0.5rem + var(--safe-top)); box-sizing: border-box; max-width: 420px; margin: 0 auto; }
        .settings-panel { background: white; border-radius: 1.25rem; padding: 0.75rem; border: 1px solid #f1f5f9; margin-bottom: 0.5rem; flex-shrink: 0; }
        .visualizer-area { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; margin: 0.25rem 0; }
        canvas { max-height: 100%; max-width: 100%; aspect-ratio: 1/1; background: white; border-radius: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.04); transition: background-color 0.5s ease; }
        .info-hub { background: white; padding: 1rem; border-radius: 1.75rem; box-shadow: 0 -5px 30px rgba(0,0,0,0.06); border: 1px solid #f1f5f9; flex-shrink: 0; margin-bottom: var(--safe-bottom); }
        .fav-btn { font-size: 9px; font-weight: 800; padding: 6px 12px; border-radius: 8px; text-transform: uppercase; border: 1px solid #e2e8f0; background: #f8fafc; color: #64748b; }
        .fav-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }
        .offset-btn { width: 28px; height: 28px; background: #f1f5f9; border-radius: 6px; font-weight: 900; font-size: 14px; color: #475569; display: flex; align-items: center; justify-content: center; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: #e2e8f0; border-radius: 10px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #4f46e5; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="flex justify-between items-center px-2 mb-2 flex-shrink-0">
            <h1 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">SolarCycle Pro</h1>
            <div class="flex gap-1.5">
                <button onclick="useCurrentLoc(this)" id="btnCurrent" class="fav-btn active">Local</button>
                <button onclick="loadSavedLoc(this)" id="btnSaved" class="fav-btn">Favorite</button>
            </div>
        </header>

        <section class="settings-panel">
            <div class="flex gap-2 items-end mb-3">
                <div class="flex-1">
                    <label class="text-[8px] font-black text-slate-400 block mb-1 uppercase">Lat</label>
                    <input type="number" id="latIn" value="45.27" step="0.0001" class="w-full p-2 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100 text-center">
                </div>
                <div class="flex-1">
                    <label class="text-[8px] font-black text-slate-400 block mb-1 uppercase">Lon</label>
                    <input type="number" id="lonIn" value="-66.06" step="0.0001" class="w-full p-2 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100 text-center">
                </div>
                <button onclick="saveToFavorite()" class="h-[34px] px-3 bg-indigo-50 text-indigo-600 rounded-xl">★</button>
            </div>
            <div class="flex justify-between items-center bg-slate-50 p-2 rounded-xl">
                <button onclick="resetToGeoOffset()" class="offset-btn text-[10px]">↺</button>
                <div class="flex items-center gap-3">
                    <button onclick="adjTZ(-1)" class="offset-btn">-</button>
                    <span id="tzLabel" class="text-xs font-black text-slate-700 min-w-[50px] text-center">UTC-4</span>
                    <button onclick="adjTZ(1)" class="offset-btn">+</button>
                </div>
            </div>
        </section>

        <main class="visualizer-area"><canvas id="cvs" width="600" height="600"></canvas></main>

        <footer class="info-hub">
            <div class="flex justify-between items-center mb-4 pb-4 border-b border-slate-50">
                <div class="text-left">
                    <p class="text-[9px] font-black text-amber-500 uppercase mb-1">☼ Sunrise</p>
                    <time id="riseT" class="text-3xl font-black text-slate-900 tracking-tight">--:--</time>
                    <p id="dayL" class="text-[8px] font-bold text-slate-400 mt-1 uppercase">-- Day</p>
                </div>
                <div class="text-center">
                    <div class="bg-slate-100 px-3 py-1 rounded-full mb-2">
                        <span id="dateD" class="text-[10px] font-black text-slate-600 block">--</span>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[9px] font-black text-indigo-500 uppercase mb-1">Sunset ☼</p>
                    <time id="setT" class="text-3xl font-black text-slate-900 tracking-tight">--:--</time>
                    <p id="nightL" class="text-[8px] font-bold text-slate-400 mt-1 uppercase">-- Night</p>
                </div>
            </div>
            
            <div class="flex justify-between items-center px-2 mb-4">
                <div class="text-center">
                    <p class="text-[7px] font-black text-slate-400 uppercase">Moonrise</p>
                    <p id="mRise" class="text-xs font-bold text-slate-700">--:--</p>
                </div>
                <div class="text-center">
                    <p class="text-[7px] font-black text-slate-400 uppercase">Moonset</p>
                    <p id="mSet" class="text-xs font-bold text-slate-700">--:--</p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <input type="range" id="sld" min="0" max="365" value="0" class="flex-1">
                <button id="resetBtn" class="text-[10px] font-black text-indigo-600 uppercase">Live</button>
            </div>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('cvs'), ctx = canvas.getContext('2d'), W = 600, H = 600, R = 240, R_MOON = 180;
        const latIn = document.getElementById('latIn'), lonIn = document.getElementById('lonIn'), sld = document.getElementById('sld');
        const dateD = document.getElementById('dateD'), riseT = document.getElementById('riseT'), setT = document.getElementById('setT'), tzLabel = document.getElementById('tzLabel');
        const dayL = document.getElementById('dayL'), nightL = document.getElementById('nightL'), btnSaved = document.getElementById('btnSaved');
        const mRise = document.getElementById('mRise'), mSet = document.getElementById('mSet');

        let manualOffset = Math.round(parseFloat(lonIn.value) / 15);

        function adjTZ(v) { manualOffset += v; render(); }
        function resetToGeoOffset() { manualOffset = Math.round(parseFloat(lonIn.value) / 15); render(); }

        function getTargetDate(offsetHours) {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * offsetHours));
        }

        function fmt(d) {
            if (!d || isNaN(d.getTime())) return '--:--';
            let hr = d.getHours(), mn = d.getMinutes();
            return `${hr % 12 || 12}:${String(mn).padStart(2, '0')} ${hr >= 12 ? 'PM' : 'AM'}`;
        }

        function render() {
            ctx.clearRect(0, 0, W, H);
            const lat = parseFloat(latIn.value), lon = parseFloat(lonIn.value);
            tzLabel.textContent = `UTC${manualOffset >= 0 ? '+' : ''}${manualOffset}`;

            const targetNow = getTargetDate(manualOffset);
            const viewDate = new Date(targetNow);
            viewDate.setDate(viewDate.getDate() + parseInt(sld.value));
            
            dateD.textContent = viewDate.toLocaleDateString('en-US',{month:'short',day:'numeric'}).toUpperCase();
            
            const times = SunCalc.getTimes(viewDate, lat, lon);
            const mTimes = SunCalc.getMoonTimes(viewDate, lat, lon);
            
            riseT.textContent = fmt(times.sunrise); 
            setT.textContent = fmt(times.sunset);
            mRise.textContent = mTimes.alwaysUp ? 'UP ALL DAY' : (mTimes.alwaysDown ? 'DOWN ALL DAY' : fmt(mTimes.rise));
            mSet.textContent = mTimes.alwaysUp ? 'UP ALL DAY' : (mTimes.alwaysDown ? 'DOWN ALL DAY' : fmt(mTimes.set));

            if (times.sunrise && times.sunset) {
                const dl = (times.sunset - times.sunrise) / 3600000;
                dayL.textContent = `${Math.floor(dl)}H ${Math.round((dl%1)*60)}M DAY`;
                nightL.textContent = `${Math.floor(24-dl)}H ${Math.round(((24-dl)%1)*60)}M NIGHT`;
            }

            // Dynamic Canvas Background based on Night/Day at target location
            const isNightAtTarget = targetNow < times.sunrise || targetNow > times.sunset;
            canvas.style.backgroundColor = isNightAtTarget ? '#0f172a' : '#ffffff';
            const textColor = isNightAtTarget ? '#f8fafc' : '#1e293b';

            const getPos = (d) => {
                if (!d || isNaN(d.getTime())) return null;
                const h = d.getHours() + d.getMinutes()/60 + d.getSeconds()/3600;
                return (h/24)*2*Math.PI-Math.PI/2;
            };

            const drawArc = (s, e, c, rad, w=40) => {
                if (!s || !e) return;
                ctx.strokeStyle = c; ctx.lineWidth = w; ctx.beginPath();
                ctx.arc(300, 300, rad, getPos(s), getPos(e));
                ctx.stroke();
            };

            // SUN RING (Outer)
            drawArc(new Date(2026,0,1,0,0), new Date(2026,0,1,23,59), isNightAtTarget ? '#1e293b' : '#f1f5f9', R); // Background
            drawArc(times.dawn, times.night, '#4f46e5', R); // Twilight
            drawArc(times.sunrise, times.sunset, '#fbbf24', R); // Day
            drawArc(times.sunrise, times.goldenHourEnd, '#f59e0b', R, 45); // Golden Hour AM
            drawArc(times.goldenHour, times.sunset, '#f59e0b', R, 45); // Golden Hour PM

            // Solar Noon Tick
            if (times.solarNoon) {
                const noonAng = getPos(times.solarNoon);
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 4; ctx.beginPath();
                ctx.moveTo(300 + (R-25)*Math.cos(noonAng), 300 + (R-25)*Math.sin(noonAng));
                ctx.lineTo(300 + (R+25)*Math.cos(noonAng), 300 + (R+25)*Math.sin(noonAng));
                ctx.stroke();
            }

            // MOON RING (Inner)
            drawArc(new Date(2026,0,1,0,0), new Date(2026,0,1,23,59), isNightAtTarget ? '#1e293b' : '#f1f5f9', R_MOON, 20); // Background
            const sod = new Date(viewDate); sod.setHours(0,0,0,0);
            const eod = new Date(viewDate); eod.setHours(23,59,59,999);
            
            if (mTimes.alwaysUp) {
                drawArc(sod, eod, '#cbd5e1', R_MOON, 20);
            } else if (!mTimes.alwaysDown && mTimes.rise && mTimes.set) {
                if (mTimes.rise < mTimes.set) {
                    drawArc(mTimes.rise, mTimes.set, '#cbd5e1', R_MOON, 20);
                } else {
                    drawArc(sod, mTimes.set, '#cbd5e1', R_MOON, 20);
                    drawArc(mTimes.rise, eod, '#cbd5e1', R_MOON, 20);
                }
            }

            // Dial Numbers
            ctx.textAlign = 'center'; ctx.fillStyle = textColor; ctx.font = 'bold 12px Inter';
            for (let i = 0; i < 24; i += 3) {
                const a = (i/24)*2*Math.PI-Math.PI/2;
                ctx.fillText(i === 0 ? '24' : i, 300 + 285*Math.cos(a), 300 + 285*Math.sin(a));
            }

            // Red Hand (Current Target Time)
            const handAng = getPos(targetNow);
            ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 10; ctx.lineCap = 'round'; ctx.beginPath();
            ctx.moveTo(300, 300);
            ctx.lineTo(300 + (R+10)*Math.cos(handAng), 300 + (R+10)*Math.sin(handAng));
            ctx.stroke();

            // Digital Center
            ctx.fillStyle = textColor; ctx.font = '900 70px Inter';
            const hh = String(targetNow.getHours()).padStart(2, '0'), mm = String(targetNow.getMinutes()).padStart(2, '0');
            ctx.fillText(`${hh}:${mm}`, 300, 320);
        }

        function saveToFavorite() {
            const name = prompt("Name this favorite:");
            if (name) {
                localStorage.setItem('solarFav', JSON.stringify({ name: name.toUpperCase(), lat: latIn.value, lon: lonIn.value, tz: manualOffset }));
                updateFavUI();
            }
        }
        function updateFavUI() {
            const s = JSON.parse(localStorage.getItem('solarFav'));
            if (s) btnSaved.innerText = s.name;
        }
        function loadSavedLoc(btn) {
            const s = JSON.parse(localStorage.getItem('solarFav'));
            if (s) { 
                latIn.value = s.lat; lonIn.value = s.lon; 
                if(s.tz !== undefined) manualOffset = s.tz;
                setActive(btn); 
            }
        }
        function useCurrentLoc(btn) {
            navigator.geolocation.getCurrentPosition(p => {
                latIn.value = p.coords.latitude.toFixed(4); lonIn.value = p.coords.longitude.toFixed(4);
                manualOffset = Math.round(p.coords.longitude / 15);
                setActive(btn);
            });
        }
        function setActive(btn) {
            document.querySelectorAll('.fav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); render();
        }

        sld.oninput = render;
        latIn.oninput = () => { resetToGeoOffset(); };
        lonIn.oninput = () => { resetToGeoOffset(); };
        document.getElementById('resetBtn').onclick = () => { sld.value = 0; render(); };
        window.onload = () => { updateFavUI(); render(); setInterval(render, 1000); };
    </script>
</body>
</html>
